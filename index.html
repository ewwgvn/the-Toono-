// Theme state — persisted
let currentTheme = "dark";
try { currentTheme = localStorage.getItem("toono-theme") || "dark"; } catch(e) {}
let T = currentTheme === "light" ? {...LIGHT} : {...DARK};

function setTheme(mode) {
  currentTheme = mode;
  try { localStorage.setItem("toono-theme", mode); } catch(e) {}
  const src = mode === "light" ? LIGHT : DARK;
  Object.assign(T, src);
  // Update body background
  if(typeof document !== "undefined") {
    document.body.style.background = T.bg;
    document.documentElement.style.background = T.bg;
    document.querySelector('meta[name="theme-color"]')?.setAttribute("content", T.bg);
  }
}
// Apply saved theme on load
if(typeof document !== "undefined" && currentTheme === "light") setTheme("light");

// ══════════════════════════════════════════
// SUPABASE CONFIG — Replace with your project URL & anon key
// Get these from: supabase.com → Project → Settings → API
// ══════════════════════════════════════════
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

// Initialize Supabase client (loaded via CDN in HTML)
let supabase = null;
function initSupabase() {
  if (typeof window !== "undefined" && window.supabase && SUPABASE_URL !== "https://YOUR_PROJECT.supabase.co") {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
  }
  return false;
}
const isSupabaseReady = () => supabase !== null;

// ══════════════════════════════════════════
// DB — Data layer (Supabase with localStorage fallback)
// ══════════════════════════════════════════
const DB = {
  // Auth
  async signUp(email, password, name, role) {
    if (!isSupabaseReady()) return { user: { id: "local-" + Date.now() }, error: null };
    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { name, role } }
    });
    if (!error && data.user) {
      await supabase.from("profiles").update({ name, role, comm_open: role === "creator" }).eq("id", data.user.id);
    }
    return { user: data?.user, error };
  },

  async signIn(email, password) {
    if (!isSupabaseReady()) return { user: null, error: { message: "Supabase тохиргоо хийгдээгүй. localStorage ашиглаж байна." } };
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    return { user: data?.user, error };
  },

  async signOut() {
    if (isSupabaseReady()) await supabase.auth.signOut();
  },

  async getSession() {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.auth.getSession();
    return data?.session;
  },

  async getCurrentUser() {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.auth.getUser();
    return data?.user;
  },

  // Profile
  async getProfile(userId) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("profiles").select("*").eq("id", userId).single();
    return data;
  },

  async updateProfile(userId, updates) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("profiles").update(updates).eq("id", userId).select().single();
    return data;
  },

  // Works
  async getWorks(filters = {}) {
    if (!isSupabaseReady()) return [];
    let query = supabase.from("works").select("*, profiles!creator_id(name, rating, comm_open)").eq("status", "published").order("created_at", { ascending: false });
    if (filters.category) query = query.eq("category", filters.category);
    if (filters.material) query = query.eq("material", filters.material);
    if (filters.creator_id) query = query.eq("creator_id", filters.creator_id);
    if (filters.search) query = query.or(`title.ilike.%${filters.search}%,description.ilike.%${filters.search}%`);
    if (filters.limit) query = query.limit(filters.limit);
    const { data } = await query;
    return data || [];
  },

  async getWork(id) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("works").select("*, profiles!creator_id(name, field, rating, comm_open, photo)").eq("id", id).single();
    // Increment view count
    if (data) supabase.from("works").update({ views_count: (data.views_count || 0) + 1 }).eq("id", id);
    return data;
  },

  async createWork(work) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("works").insert(work).select().single();
    return data;
  },

  async updateWork(id, updates) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("works").update({ ...updates, updated_at: new Date().toISOString() }).eq("id", id).select().single();
    return data;
  },

  async deleteWork(id) {
    if (!isSupabaseReady()) return;
    await supabase.from("works").delete().eq("id", id);
  },

  // My works (for creator)
  async getMyWorks(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("works").select("*").eq("creator_id", userId).order("created_at", { ascending: false });
    return data || [];
  },

  // Orders
  async createOrder(order) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("orders").insert(order).select().single();
    return data;
  },

  async getMyOrders(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("orders").select("*").eq("buyer_id", userId).order("created_at", { ascending: false });
    return data || [];
  },

  async getReceivedOrders(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("orders").select("*").eq("seller_id", userId).order("created_at", { ascending: false });
    return data || [];
  },

  async updateOrder(id, updates) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("orders").update(updates).eq("id", id).select().single();
    return data;
  },

  // Likes / Saves / Follows
  async toggleLike(userId, workId) {
    if (!isSupabaseReady()) return;
    const { data } = await supabase.from("likes").select().eq("user_id", userId).eq("work_id", workId);
    if (data && data.length > 0) {
      await supabase.from("likes").delete().eq("user_id", userId).eq("work_id", workId);
      await supabase.rpc("decrement_likes", { wid: workId }).catch(() => {});
    } else {
      await supabase.from("likes").insert({ user_id: userId, work_id: workId });
      await supabase.rpc("increment_likes", { wid: workId }).catch(() => {});
    }
  },

  async toggleSave(userId, workId) {
    if (!isSupabaseReady()) return;
    const { data } = await supabase.from("saves").select().eq("user_id", userId).eq("work_id", workId);
    if (data && data.length > 0) {
      await supabase.from("saves").delete().eq("user_id", userId).eq("work_id", workId);
    } else {
      await supabase.from("saves").insert({ user_id: userId, work_id: workId });
    }
  },

  async toggleFollow(followerId, followingId) {
    if (!isSupabaseReady()) return;
    const { data } = await supabase.from("follows").select().eq("follower_id", followerId).eq("following_id", followingId);
    if (data && data.length > 0) {
      await supabase.from("follows").delete().eq("follower_id", followerId).eq("following_id", followingId);
    } else {
      await supabase.from("follows").insert({ follower_id: followerId, following_id: followingId });
    }
  },

  async getMyLikes(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("likes").select("work_id").eq("user_id", userId);
    return (data || []).map(d => d.work_id);
  },

  async getMySaves(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("saves").select("work_id").eq("user_id", userId);
    return (data || []).map(d => d.work_id);
  },

  async getMyFollows(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("follows").select("following_id").eq("follower_id", userId);
    return (data || []).map(d => d.following_id);
  },

  // Notifications
  async getNotifications(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("notifications").select("*").eq("user_id", userId).order("created_at", { ascending: false }).limit(50);
    return data || [];
  },

  async markNotificationRead(id) {
    if (!isSupabaseReady()) return;
    await supabase.from("notifications").update({ read: true }).eq("id", id);
  },

  async createNotification(notif) {
    if (!isSupabaseReady()) return;
    await supabase.from("notifications").insert(notif);
  },

  // Commissions
  async createCommission(comm) {
    if (!isSupabaseReady()) return null;
    const { data } = await supabase.from("commissions").insert(comm).select().single();
    return data;
  },

  async getMyCommissions(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("commissions").select("*").eq("buyer_id", userId).order("created_at", { ascending: false });
    return data || [];
  },

  async getReceivedCommissions(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("commissions").select("*").eq("seller_id", userId).order("created_at", { ascending: false });
    return data || [];
  },

  // Reviews
  async getReviews(sellerId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("reviews").select("*, profiles!reviewer_id(name)").eq("seller_id", sellerId).order("created_at", { ascending: false });
    return data || [];
  },

  // Messages (realtime)
  async getConversations(userId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("conversations").select("*, user_a_profile:profiles!user_a(name, photo), user_b_profile:profiles!user_b(name, photo)").or(`user_a.eq.${userId},user_b.eq.${userId}`).order("last_at", { ascending: false });
    return data || [];
  },

  async getMessages(conversationId) {
    if (!isSupabaseReady()) return [];
    const { data } = await supabase.from("messages").select("*").eq("conversation_id", conversationId).order("created_at", { ascending: true });
    return data || [];
  },

  async sendMessage(conversationId, senderId, text, image = null) {
    if (!isSupabaseReady()) return;
    await supabase.from("messages").insert({ conversation_id: conversationId, sender_id: senderId, text, image });
    await supabase.from("conversations").update({ last_message: text || "Зураг", last_at: new Date().toISOString() }).eq("id", conversationId);
  },

  // File upload
  async uploadFile(bucket, path, file) {
    if (!isSupabaseReady()) return null;
    const { data, error } = await supabase.storage.from(bucket).upload(path, file, { upsert: true });
    if (error) return null;
    const { data: urlData } = supabase.storage.from(bucket).getPublicUrl(path);
    return urlData?.publicUrl;
  },

  // Realtime subscriptions
  subscribeToMessages(conversationId, callback) {
    if (!isSupabaseReady()) return null;
    return supabase.channel(`messages:${conversationId}`)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: `conversation_id=eq.${conversationId}` }, payload => callback(payload.new))
      .subscribe();
  },

  subscribeToNotifications(userId, callback) {
    if (!isSupabaseReady()) return null;
    return supabase.channel(`notifs:${userId}`)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "notifications", filter: `user_id=eq.${userId}` }, payload => callback(payload.new))
      .subscribe();
  },

  unsubscribe(channel) {
    if (channel && isSupabaseReady()) supabase.removeChannel(channel);
  },

  // Creators list
  async getCreators(filters = {}) {
    if (!isSupabaseReady()) return [];
    let query = supabase.from("profiles").select("*").eq("role", "creator").order("rating", { ascending: false });
    if (filters.search) query = query.or(`name.ilike.%${filters.search}%,field.ilike.%${filters.search}%`);
    if (filters.limit) query = query.limit(filters.limit);
    const { data } = await query;
    return data || [];
  },
};

// ══════════════════════════════════════════
// SYNC — Load Supabase data into GS (local cache)
// ══════════════════════════════════════════
async function syncFromSupabase() {
  if (!isSupabaseReady()) return false;
  try {
    const user = await DB.getCurrentUser();
    if (!user) return false;
    
    const profile = await DB.getProfile(user.id);
    if (!profile) return false;
    
    GS.isLoggedIn = true;
    GS.currentRole = profile.role || "buyer";
    GS.user = {
      id: user.id,
      name: profile.name || "",
      field: profile.field || "",
      bio: profile.bio || "",
      tags: profile.tags || [],
      photo: profile.photo || null,
      revenue: "₮0",
      works: 0,
      followers: String(profile.followers_count || 0),
      following_count: profile.following_count || 0,
      rating: profile.rating || 0,
      commOpen: profile.comm_open || false,
    };
    GS.trustMetrics = {
      responseRate: profile.response_rate || 100,
      onTimeRate: profile.on_time_rate || 100,
      avgRating: profile.rating || 0,
      totalOrders: profile.total_orders || 0,
      memberSince: profile.created_at?.slice(0,7) || "",
    };
    
    // Load user data in parallel
    const [myWorks, orders, likes, saves, follows, notifs, comms, receivedComms] = await Promise.all([
      DB.getMyWorks(user.id),
      DB.getMyOrders(user.id),
      DB.getMyLikes(user.id),
      DB.getMySaves(user.id),
      DB.getMyFollows(user.id),
      DB.getNotifications(user.id),
      DB.getMyCommissions(user.id),
      DB.getReceivedCommissions(user.id),
    ]);
    
    GS.myWorks = myWorks;
    GS.user.works = myWorks.length;
    GS.orders = orders;
    GS.liked = new Set(likes);
    GS.saved = new Set(saves);
    GS.following = new Set(follows);
    GS.notifications = notifs.map(n => ({
      id: n.id, icon: n.icon, title: n.title, desc: n.description,
      time: new Date(n.created_at).toLocaleDateString(), read: n.read, to: n.link,
    }));
    GS.myCommissions = comms;
    GS.receivedCommissions = receivedComms;
    GS.seeded = true;
    GS.needsProfileSetup = !profile.name || profile.name.length === 0;
    
    // Revenue calculation
    const totalRev = orders.filter(o=>o.status==="done").reduce((s,o)=>s+o.total_price,0);
    GS.user.revenue = "₮" + totalRev.toLocaleString();
    
    return true;
  } catch(e) {
    console.error("Supabase sync error:", e);
    return false;
  }
}

// ── DYNAMIC BADGE COMPUTATION (replaces manual counters) ──
function getUnreadChat(){ return GS.conversations.reduce((s,c)=>s+(c.unread||0),0); }
function getUnreadNotif(){ return GS.notifications.filter(n=>!n.read).length; }

// ── PERSISTENCE via window.storage ──
const STORAGE_KEY = "toono-app-state";

async function saveGS() {
  try {
    const data = {
      isLoggedIn: GS.isLoggedIn,
      needsProfileSetup: GS.needsProfileSetup,
      currentRole: GS.currentRole,
      activeChatId: GS.activeChatId,
      user: {...GS.user, id: GS.user.id},
      myWorks: GS.myWorks,
      orders: GS.orders,
      myCommissions: GS.myCommissions,
      receivedCommissions: GS.receivedCommissions,
      notifications: GS.notifications,
      conversations: GS.conversations,
      cart: GS.cart,
      seeded: GS.seeded,
      liked: [...GS.liked],
      saved: [...GS.saved],
      following: [...GS.following],
      notifRead: [...GS.notifRead],
      recentlyViewed: GS.recentlyViewed?.slice(0,20) || [],
      wishlists: GS.wishlists || [],
      offers: GS.offers || [],
      trustMetrics: GS.trustMetrics || {},
    };
    await window.storage.set(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { /* storage unavailable, silent fail */ }
}

async function loadGS() {
  try {
    const result = await window.storage.get(STORAGE_KEY);
    if (!result?.value) return false;
    const data = JSON.parse(result.value);
    GS.isLoggedIn = data.isLoggedIn || false;
    GS.needsProfileSetup = data.needsProfileSetup || false;
    GS.currentRole = data.currentRole || null;
    GS.activeChatId = data.activeChatId || null;
    if(data.user) Object.assign(GS.user, data.user);
    GS.myWorks = data.myWorks || [];
    GS.orders = data.orders || [];
    GS.myCommissions = data.myCommissions || [];
    GS.receivedCommissions = data.receivedCommissions || [];
    GS.notifications = data.notifications || [];
    GS.conversations = data.conversations || [];
    GS.cart = data.cart || [];
    GS.seeded = data.seeded || false;
    GS.liked = new Set(data.liked || []);
    GS.saved = new Set(data.saved || []);
    GS.following = new Set(data.following || []);
    GS.notifRead = new Set(data.notifRead || []);
    GS.recentlyViewed = data.recentlyViewed || [];
    GS.wishlists = data.wishlists || [{id:1,name:"Хадгалах жагсаалт",items:[]}];
    GS.offers = data.offers || [];
    GS.trustMetrics = data.trustMetrics || {responseRate:100,onTimeRate:100,avgRating:0,totalOrders:0,memberSince:""};
    // Recompute badge counters from actual data
    GS.unreadChat = getUnreadChat();
    GS.unreadNotif = getUnreadNotif();
    return true;
  } catch(e) { return false; }
}

// Seed demo data for logged-in demo users
function seedDemoData(role, userName) {
  GS.isLoggedIn = true;
  GS.currentRole = role;
  GS.user.name = userName;
  GS.needsProfileSetup = true; // Always go to profile setup for new accounts
  
  if(role === "creator") {
    GS.user.commOpen = true;
    GS.trustMetrics = {responseRate:100,onTimeRate:100,avgRating:0,totalOrders:0,memberSince:new Date().toISOString().slice(0,7)};
  }
  // Welcome notification
  GS.notifications = [
    {id:Date.now(),icon:"follow",title:"The TOONO-д тавтай морил!",desc:"Профайлаа тохируулаад, бүтээлээ байршуулаарай.",time:"Сая",read:false,to:"me"},
  ];
  GS.seeded = true;
  GS.unreadNotif = getUnreadNotif();
  GS.unreadChat = getUnreadChat();
  saveGS();
}

function resetGS() {
  GS.isLoggedIn = false;
  GS.needsProfileSetup = false;
  GS.currentRole = null;
  GS.user = {name:"",field:"",bio:"",tags:[],photo:null,revenue:"₮0",works:0,followers:"0",following_count:0,rating:0,commOpen:false};
  GS.myWorks = [];
  GS.orders = [];
  GS.myCommissions = [];
  GS.receivedCommissions = [];
  GS.notifications = [];
  GS.conversations = [];
  GS.activeChatId = null;
  GS.liked = new Set();
  GS.saved = new Set();
  GS.following = new Set();
  GS.cart = [];
  GS.unreadChat = 0;
  GS.unreadNotif = 0;

function Toono({size=32, color=T.accent}) {
  return <div style={{
    width:size,height:size,flexShrink:0,display:"inline-block",
    backgroundColor:color,
    WebkitMaskImage:`url(${TOONO_B64})`,
    WebkitMaskSize:"contain",
    WebkitMaskRepeat:"no-repeat",
    WebkitMaskPosition:"center",
    maskImage:`url(${TOONO_B64})`,
    maskSize:"contain",
    maskRepeat:"no-repeat",
    maskPosition:"center",
  }}/>;
}

// ── IMAGE CROPPER ──
function ImageCropper({src, onDone, onCancel, aspect="square", allowRatioChange=false}) {
  const containerRef = useRef(null);
  const loadedImg = useRef(null);
  const [imgNat,setImgNat]=useState({w:1,h:1});
  const [scale,setScale]=useState(1);
  const [pos,setPos]=useState({x:0,y:0});
  const [ratio,setRatio]=useState(aspect);
  const [customW,setCustomW]=useState("4");
  const [customH,setCustomH]=useState("5");
  const [showCustom,setShowCustom]=useState(false);
  const dragRef=useRef({active:false,sx:0,sy:0,px:0,py:0});
  const pinchRef=useRef({active:false,d0:0,s0:1});

  const maxW=Math.min(320, typeof window!=="undefined"?window.innerWidth-48:320);
  const customRatio=ratio==="custom"?(parseInt(customW)||1)/(parseInt(customH)||1):null;
  const ratioVal=customRatio||{"circle":1,"square":1,"16:9":16/9,"4:3":4/3,"3:4":3/4,"9:16":9/16}[ratio]||1;
  const cW=ratioVal>=1?maxW:Math.round(maxW*ratioVal);
  const cH=ratioVal>=1?Math.round(maxW/ratioVal):maxW;

  const fitImage=(iw,ih,cw,ch)=>{
    const s=Math.max(cw/iw,ch/ih)*1.01;
    return {s, x:(cw-iw*s)/2, y:(ch-ih*s)/2};
  };

  const clampPos=(px,py,s,cw,ch,iw,ih)=>({
    x:Math.min(0,Math.max(cw-iw*s, px)),
    y:Math.min(0,Math.max(ch-ih*s, py)),
  });

  // Load image
  useEffect(()=>{
    const img=new Image();
    img.onload=()=>{
      loadedImg.current=img;
      setImgNat({w:img.naturalWidth,h:img.naturalHeight});
      const f=fitImage(img.naturalWidth,img.naturalHeight,cW,cH);
      setScale(f.s);setPos({x:f.x,y:f.y});
    };
    img.src=src;
  },[src]);

  // Re-fit when ratio changes
  useEffect(()=>{
    if(imgNat.w<=1) return;
    const f=fitImage(imgNat.w,imgNat.h,cW,cH);
    setScale(f.s);setPos({x:f.x,y:f.y});
  },[ratio,cW,cH,imgNat.w,imgNat.h,customW,customH]);

  // Drag
  const onDown=(e)=>{
    e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    dragRef.current={active:true,sx:pt.clientX,sy:pt.clientY,px:pos.x,py:pos.y};
    if(e.touches?.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchRef.current={active:true,d0:Math.hypot(dx,dy),s0:scale};
    }
  };
  const onMove=(e)=>{
    e.preventDefault();
    if(e.touches?.length===2&&pinchRef.current.active){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const ns=Math.max(0.2,Math.min(8,pinchRef.current.s0*(Math.hypot(dx,dy)/pinchRef.current.d0)));
      setScale(ns);
      setPos(p=>clampPos(p.x,p.y,ns,cW,cH,imgNat.w,imgNat.h));
      return;
    }
    if(!dragRef.current.active) return;
    const pt=e.touches?e.touches[0]:e;
    const np=clampPos(
      dragRef.current.px+(pt.clientX-dragRef.current.sx),
      dragRef.current.py+(pt.clientY-dragRef.current.sy),
      scale,cW,cH,imgNat.w,imgNat.h
    );
    setPos(np);
  };
  const onUp=()=>{dragRef.current.active=false;pinchRef.current.active=false;};

  const onWheel=(e)=>{
    e.preventDefault();
    const ns=Math.max(0.2,Math.min(8,scale*(e.deltaY>0?0.93:1.07)));
    setScale(ns);
    setPos(p=>clampPos(p.x,p.y,ns,cW,cH,imgNat.w,imgNat.h));
  };

  const doZoom=(delta)=>{
    const ns=Math.max(0.2,Math.min(8,scale+delta));
    setScale(ns);
    setPos(p=>clampPos(p.x,p.y,ns,cW,cH,imgNat.w,imgNat.h));
  };

  // Export
  const doCrop=()=>{
    if(!loadedImg.current||imgNat.w<=1) return;
    const maxOut=1200;
    const outW=cW>=cH?maxOut:Math.round(maxOut*(cW/cH));
    const outH=cW>=cH?Math.round(maxOut*(cH/cW)):maxOut;
    const canvas=document.createElement("canvas");
    canvas.width=outW;canvas.height=outH;
    const ctx=canvas.getContext("2d");
    if(ratio==="circle"){ctx.beginPath();ctx.arc(outW/2,outH/2,Math.min(outW,outH)/2,0,Math.PI*2);ctx.clip();}
    const rx=outW/cW, ry=outH/cH;
    ctx.drawImage(loadedImg.current, pos.x*rx, pos.y*ry, imgNat.w*scale*rx, imgNat.h*scale*ry);
    onDone(canvas.toDataURL("image/jpeg",0.92));
  };

  const ratioOptions=allowRatioChange?[
    ["square","1:1","□"],["16:9","16:9","▬"],["4:3","4:3","▭"],["3:4","3:4","▯"],["9:16","9:16","▮"],["custom","Custom","⚙"]
  ]:[];

  return <div style={{position:"fixed",inset:0,zIndex:10000,background:"rgba(0,0,0,0.96)",display:"flex",flexDirection:"column",touchAction:"none"}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",flexShrink:0}}>
      <button onClick={onCancel} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:14,fontWeight:600,color:"rgba(255,255,255,0.7)",cursor:"pointer",padding:"8px"}}>Цуцлах</button>
      <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:"#fff"}}>Зураг тайрах</div>
      <button onClick={doCrop} style={{background:T.accent,border:"none",borderRadius:10,padding:"8px 20px",fontFamily:"system-ui",fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer"}}>Хадгалах</button>
    </div>

    {/* Crop viewport */}
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
      <div ref={containerRef}
        style={{position:"relative",width:cW,height:cH,overflow:"hidden",borderRadius:ratio==="circle"?"50%":12,border:"2px solid rgba(255,255,255,0.25)",cursor:dragRef.current.active?"grabbing":"grab",userSelect:"none",background:"#111"}}
        onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
        onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
        onWheel={onWheel}>
        {imgNat.w>1&&<img src={src} alt="" draggable={false}
          style={{position:"absolute",left:pos.x,top:pos.y,width:imgNat.w*scale,height:imgNat.h*scale,maxWidth:"none",maxHeight:"none",pointerEvents:"none"}}/>}
        {/* Grid overlay */}
        <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
          <div style={{position:"absolute",left:"33.33%",top:0,bottom:0,width:1,background:"rgba(255,255,255,0.12)"}}/>
          <div style={{position:"absolute",left:"66.66%",top:0,bottom:0,width:1,background:"rgba(255,255,255,0.12)"}}/>
          <div style={{position:"absolute",top:"33.33%",left:0,right:0,height:1,background:"rgba(255,255,255,0.12)"}}/>
          <div style={{position:"absolute",top:"66.66%",left:0,right:0,height:1,background:"rgba(255,255,255,0.12)"}}/>
        </div>
        {/* Size label */}
        <div style={{position:"absolute",bottom:8,right:10,fontFamily:"system-ui",fontSize:10,color:"rgba(255,255,255,0.35)",pointerEvents:"none"}}>{cW}×{cH}</div>
      </div>
    </div>

    {/* Controls */}
    <div style={{padding:"12px 24px 36px",flexShrink:0}}>
      {/* Ratio selector */}
      {ratioOptions.length>0&&<div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:ratio==="custom"?10:16,flexWrap:"wrap"}}>
        {ratioOptions.map(([k,label,icon])=><button key={k} onClick={()=>{setRatio(k);setShowCustom(k==="custom");}}
          style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 14px",borderRadius:12,fontFamily:"system-ui",fontSize:11,fontWeight:ratio===k?700:500,background:ratio===k?"rgba(91,143,232,0.2)":"rgba(255,255,255,0.05)",border:`1.5px solid ${ratio===k?T.accent+"80":"rgba(255,255,255,0.08)"}`,color:ratio===k?"#fff":"rgba(255,255,255,0.45)",cursor:"pointer",transition:"all .15s",minWidth:44}}>
          <span style={{fontSize:14,lineHeight:1}}>{icon}</span>
          <span>{label}</span>
        </button>)}
      </div>}
      {/* Custom ratio input */}
      {ratio==="custom"&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>
        <input type="number" min="1" max="32" value={customW} onChange={e=>{setCustomW(e.target.value);}}
          style={{width:52,textAlign:"center",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 4px",fontFamily:"system-ui",fontSize:16,fontWeight:700,color:"#fff",outline:"none"}}/>
        <span style={{fontFamily:"system-ui",fontSize:18,fontWeight:700,color:"rgba(255,255,255,0.3)"}}>:</span>
        <input type="number" min="1" max="32" value={customH} onChange={e=>{setCustomH(e.target.value);}}
          style={{width:52,textAlign:"center",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 4px",fontFamily:"system-ui",fontSize:16,fontWeight:700,color:"#fff",outline:"none"}}/>
        <span style={{fontFamily:"system-ui",fontSize:11,color:"rgba(255,255,255,0.3)",marginLeft:4}}>{customW}:{customH}</span>
      </div>}
      {/* Zoom */}
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>doZoom(-0.15)} style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <input type="range" min="20" max="500" value={Math.round(scale*100)}
          onChange={e=>{const ns=Number(e.target.value)/100;setScale(ns);setPos(p=>clampPos(p.x,p.y,ns,cW,cH,imgNat.w,imgNat.h));}}
          style={{flex:1,accentColor:T.accent,height:4,cursor:"pointer"}}/>
        <button onClick={()=>doZoom(0.15)} style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
      <div style={{textAlign:"center",fontFamily:"system-ui",fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:6}}>{Math.round(scale*100)}%</div>
    </div>
  </div>;
}

  const [t, setT] = useState(null);
  useEffect(()=>{
    toastFn = item => { setT(item); setTimeout(()=>setT(null),2500); };

  if(!t) return null;
  const cols = {info:T.accent,success:T.green,error:T.red,warning:T.yellow};

function StarSellerBadge({size="sm"}) {
  const met = GS.trustMetrics;
  const isStarSeller = met.responseRate>=95 && met.onTimeRate>=95 && met.avgRating>=4.8;

const CREATORS = [];
function getCreators() {

  const list = [];
  if(GS.isLoggedIn && GS.currentRole==="creator") {
    list.push({id:1,name:GS.user.name,field:GS.user.field||"Бүтээлч",followers:GS.user.followers||"0",works:GS.myWorks.length,comm:GS.user.commOpen,rating:GS.trustMetrics?.avgRating||0,accent:"#5B8FE8",level:GS.trustMetrics?.avgRating>=4.8?"top":"verified"});

const WORKS = [];
function getAllWorks() {
  // Combine user's works + WORKS array (which gets items pushed from uploads)
  const combined = [...WORKS];
  GS.myWorks.forEach(w => {
    if(!combined.find(x=>x.id===w.id)) combined.unshift(w);
  });
  return combined;
}

// ── LOGIN ──

function Login({nav}) {
  const [mode,setMode]=useState("login");
  const [step,setStep]=useState(0);
  const [role,setRole]=useState("");
  const [signupField,setSignupField]=useState("");
  const [loading,setLoading]=useState(false);
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pwConfirm,setPwConfirm]=useState("");
  const [showPw,setShowPw]=useState(false);
  const [name,setName]=useState("");
  const [errors,setErrors]=useState({});
  const [agree,setAgree]=useState(false);

  const validate = () => {
    const e = {};
    if(!email) e.email = "Имэйл оруулна уу";
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) e.email = "Зөв имэйл оруулна уу";
    if(!pw) e.pw = "Нууц үг оруулна уу";
    else if(pw.length < 6) e.pw = "Нууц үг 6-аас дээш тэмдэгт байх ёстой";
    return e;
  };

  const handleLogin = async () => {
    const e = validate();
    if(Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setLoading(true);
    
    if (isSupabaseReady()) {
      const { user, error } = await DB.signIn(email, pw);
      setLoading(false);
      if (error) {
        if (error.message.includes("Invalid login")) setErrors({pw:"Имэйл эсвэл нууц үг буруу байна"});
        else setErrors({email: error.message});
        toast("Нэвтрэх мэдээлэл буруу байна","error");
        return;
      }
      const synced = await syncFromSupabase();
      if (synced) {
        nav(GS.needsProfileSetup ? "profile-setup" : "home");
        toast(`Тавтай морил, ${GS.user.name.split(" ")[0] || ""}!`,"success");
      }
    } else {
      // localStorage fallback
      setTimeout(()=>{
        setLoading(false);
        GS.isLoggedIn = true;
        GS.currentRole = "buyer";
        GS.user.name = email.split("@")[0];
        GS.needsProfileSetup = true;
        saveGS();
        nav("profile-setup");
        toast("Нэвтэрлээ","success");
      }, 600);
    }
  };

  const handleSignup = async () => {
    const e = validate();
    if(!name) e.name = "Нэр оруулна уу";
    if(pw !== pwConfirm) e.pwConfirm = "Нууц үг таарахгүй байна";
    if(!agree) e.agree = "Үйлчилгээний нөхцлийг зөвшөөрнө үү";
    if(Object.keys(e).length){ setErrors(e); return; }
    setErrors({});
    setLoading(true);
    
    if (isSupabaseReady()) {
      const { user, error } = await DB.signUp(email, pw, name.trim(), role || "buyer");
      setLoading(false);
      if (error) {
        if (error.message.includes("already registered")) setErrors({email:"Энэ имэйл бүртгэлтэй байна"});
        else setErrors({email: error.message});
        toast("Бүртгэл амжилтгүй","error");
        return;
      }
      GS.isLoggedIn = true;
      GS.currentRole = role || "buyer";
      GS.user.name = name.trim();
      GS.user.field = signupField || "";
      GS.user.id = user?.id;
      GS.needsProfileSetup = true;
      saveGS();
      nav("profile-setup");
      toast(`Тавтай морил, ${name.split(" ")[0]}!`,"success");
    } else {
      setTimeout(()=>{
        setLoading(false);
        seedDemoData(role || "buyer", name.trim());
        GS.user.field = signupField || "";
        nav("profile-setup");
        toast(`Тавтай морил, ${name.split(" ")[0]}!`,"success");
      }, 800);
    }
  };



  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,alignItems:"center"}}>
    <div style={{width:"100%",maxWidth:480}}>
    <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",gap:10}}>
      <button onClick={()=>step>0?setStep(step-1):nav("onboarding")} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
      <div style={{fontFamily:"system-ui",fontSize:18,fontWeight:700,color:T.textH}}>{mode==="login"?"Нэвтрэх":"Бүртгүүлэх"}</div>
    </div>

    <div style={{flex:1,padding:"24px 24px 0",overflowY:"auto",scrollbarWidth:"none"}}>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{display:"inline-flex",width:68,height:68,borderRadius:20,background:T.accentSub,border:`1px solid ${T.accentGlow}`,alignItems:"center",justifyContent:"center",marginBottom:12}}>
          <Toono size={42} color={T.accent}/>
        </div>
        <div style={{fontFamily:"Georgia,serif",fontSize:24,fontWeight:600,color:T.textH,letterSpacing:".04em"}}>The TOONO</div>
        {mode==="login"&&<div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginTop:4}}>Бүртгэлдээ нэвтэрнэ үү</div>}
      </div>



      {mode==="login"&&<>
        {/* Email */}
        <div style={{marginBottom:14}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Имэйл</div>
          <input
            autoFocus
            type="email" value={email} placeholder="name@email.com"
            onChange={e=>{setEmail(e.target.value);setErrors(er=>({...er,email:""}));}}
            onKeyDown={e=>e.key==="Enter"&&document.getElementById("pw-input")?.focus()}
            style={{width:"100%",background:T.s1,border:`1.5px solid ${errors.email?T.red:email&&email.includes("@")?T.green:T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",boxSizing:"border-box",transition:"border-color .15s"}}
          />
          {errors.email&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.red,marginTop:5,display:"flex",alignItems:"center",gap:4}}><span style={{display:"flex"}}><IcWarning/></span>{errors.email}</div>}

      </>}

      {mode==="signup"&&step===2&&<>

          <input value={name} onChange={e=>{setName(e.target.value);setErrors(er=>({...er,name:""}));}} placeholder="Уугана Болд" style={{width:"100%",background:T.s1,border:`1.5px solid ${errors.name?T.red:T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",boxSizing:"border-box"}}/>
          {errors.name&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.red,marginTop:5}}>{errors.name}</div>}

          <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErrors(er=>({...er,email:""}));}} placeholder="name@email.com" style={{width:"100%",background:T.s1,border:`1.5px solid ${errors.email?T.red:T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",boxSizing:"border-box"}}/>
          {errors.email&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.red,marginTop:5}}>{errors.email}</div>}
        </div>
        {/* Password */}
        <div style={{marginBottom:14}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Нууц үг</div>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErrors(er=>({...er,pw:""}));}} placeholder="6-аас дээш тэмдэгт" style={{width:"100%",background:T.s1,border:`1.5px solid ${errors.pw?T.red:T.border}`,borderRadius:13,padding:"13px 44px 13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.textSub,fontSize:16}}>
              {showPw?<IcEyeOff/>:<IcEye/>}
            </button>
          </div>
          {pw.length>0&&<div style={{display:"flex",gap:4,marginTop:6}}>
            {[{l:"Богино",ok:pw.length>=6},{l:"Дунд",ok:pw.length>=8},{l:"Хүчтэй",ok:pw.length>=10&&/[0-9]/.test(pw)}].map((s,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:s.ok?T.green:T.border,transition:"background .2s"}}/>)}
          </div>}
          {errors.pw&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.red,marginTop:5}}>{errors.pw}</div>}
        </div>
        {/* Confirm */}
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Нууц үг давтах</div>
          <input type="password" value={pwConfirm} onChange={e=>{setPwConfirm(e.target.value);setErrors(er=>({...er,pwConfirm:""}));}} placeholder="Нууц үгийг дахин оруулна уу" style={{width:"100%",background:T.s1,border:`1.5px solid ${errors.pwConfirm?T.red:pwConfirm&&pwConfirm===pw?T.green:T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",boxSizing:"border-box"}}/>
          {pwConfirm&&pwConfirm===pw&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.green,marginTop:5}}><span style={{display:"flex",marginRight:4}}><IcCheck/></span>Нууц үг таарч байна</div>}
          {errors.pwConfirm&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.red,marginTop:5}}>{errors.pwConfirm}</div>}
        </div>
        {/* PIPA Consent — Multiple checkboxes (Korean data privacy compliance) */}
        <div style={{background:T.s1,border:`1px solid ${errors.agree?T.red:T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:18}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.textH,marginBottom:10}}>Зөвшөөрөл</div>
          {[
            {key:"terms",label:"[Шаардлагатай] Үйлчилгээний нөхцөл",required:true,link:"terms"},
            {key:"privacy",label:"[Шаардлагатай] Хувийн мэдээлэл цуглуулах, ашиглах",required:true,link:"privacy"},
            {key:"age",label:"[Шаардлагатай] 14 нас дээш болохоо баталж байна",required:true},
            {key:"marketing",label:"[Сонголтоор] Маркетинг мэдээлэл хүлээн авах",required:false},
          ].map(item=><div key={item.key} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${T.border}`}}>
            <input type="checkbox" checked={item.required?agree:false} onChange={e=>{if(item.required)setAgree(e.target.checked);}} style={{accentColor:T.accent,width:16,height:16,flexShrink:0,cursor:"pointer"}}/>
            <span style={{fontFamily:"system-ui",fontSize:12,color:item.required?T.textB:T.textSub,flex:1,lineHeight:1.5}}>{item.label}</span>
            {item.link&&<button onClick={()=>nav(item.link)} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:11,color:T.accent,cursor:"pointer",flexShrink:0}}>Үзэх</button>}
          </div>)}
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10}}>
            <input type="checkbox" checked={agree} onChange={e=>setAgree(e.target.checked)} style={{accentColor:T.accent,width:18,height:18,flexShrink:0,cursor:"pointer"}}/>
            <span style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.accent}}>Бүгдийг зөвшөөрөх</span>
          </div>
        </div>
        {errors.agree&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.red,marginTop:-14,marginBottom:14}}>{errors.agree}</div>}
        <PBtn full loading={loading} onClick={handleSignup}>Бүртгэл үүсгэх</PBtn>
        <div style={{height:24}}/>
      </>}
    </div>
    </div>
  </div>;
}

// ── PROFILE SETUP (after signup) ──
function ProfileSetup({nav, refresh, goBack}) {
  const [step, setStep] = useState(0);
  const [field, setField] = useState(GS.user.field);
  const [bio, setBio] = useState("");
  const [tags, setTags] = useState([]);
  const [photo, setPhoto] = useState(null);
  const [cropSrc, setCropSrc] = useState(null);
  const [loading, setLoading] = useState(false);
  const isCreator = GS.currentRole === "creator";

  const suggestedTags = isCreator
    ? ["Загвар","Нэхмэл","Урлаг","График","3D","Гэрэл зураг","Орон зай","Бөө мөргөл","Тэнгэрийн шашин","Апокалипсийн дараах"]
    : ["Загвар сонирхогч","Коллекцлогч","Урлаг","Монгол соёл","Дизайн"];

  const handlePhoto = (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = ev => setCropSrc(ev.target.result);
    reader.readAsDataURL(f);
  };

  const finish = () => {
    setLoading(true);
    setTimeout(async () => {
      GS.user.field = field.trim();
      GS.user.bio = bio.trim();
      GS.user.tags = tags;
      if(photo) GS.user.photo = photo;
      GS.user.commOpen = isCreator;
      GS.needsProfileSetup = false;
      // Sync to Supabase
      if (isSupabaseReady() && GS.user.id) {
        await DB.updateProfile(GS.user.id, {
          name: GS.user.name,
          field: field.trim(),
          bio: bio.trim(),
          tags: tags,
          photo: photo || null,
          role: GS.currentRole,
          comm_open: isCreator,
        });
      }
      setLoading(false);
      refresh();
      nav("home");
      toast("Профайл бэлэн боллоо!","success");
    }, 600);
  };

  const skip = () => {
    GS.needsProfileSetup = false;
    nav("home");
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    {cropSrc&&<ImageCropper src={cropSrc} aspect="circle" onDone={(cropped)=>{setPhoto(cropped);setCropSrc(null);}} onCancel={()=>setCropSrc(null)}/>}
    <div style={{padding:"20px 20px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>goBack?goBack():nav("login")} style={{width:36,height:36,borderRadius:10,background:T.s1,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.textH,flexShrink:0}}><IcBack/></button>
          <div style={{fontFamily:"system-ui",fontSize:22,fontWeight:800,color:T.textH}}>Профайл тохируулах</div>
        </div>
        <button onClick={skip} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:13,color:T.textSub,cursor:"pointer"}}>Алгасах →</button>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:6}}>
        {[0,1,2].map(i=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?T.accent:T.border}}/>)}
      </div>
      <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{step+1}/3 — {["Зураг · Нэр","Чиглэл · Танилцуулга","Таг сонгох"][step]}</div>
    </div>

    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"16px 20px 0"}}>
      {step===0&&<>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}>
          <div style={{position:"relative",marginBottom:12}}>
            <div style={{width:100,height:100,borderRadius:30,background:T.accentSub,border:`2px solid ${T.accentGlow}`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {photo ? <img src={photo} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                     : <div style={{color:T.accent}}><IcProfile/></div>}
            </div>
            <label style={{position:"absolute",bottom:-4,right:-4,width:32,height:32,borderRadius:"50%",background:T.accent,border:`2px solid ${T.bg}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>
              <IcCamera/>
              <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
            </label>
          </div>
          <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>Профайл зураг нэмэх</div>
        </div>
        <Inp label="Нэр / Хочоо *" placeholder="Таны нэр эсвэл хочоо" value={GS.user.name} onChange={e=>{GS.user.name=e.target.value;refresh();}}/>
        {isCreator&&<Inp label="Мэргэжил / Чиглэл" placeholder="Загварын дизайнер · Урлагч" value={field} onChange={e=>setField(e.target.value)}/>}
      </>}

      {step===1&&<>
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Биеийн танилцуулга</div>
          <textarea value={bio} onChange={e=>setBio(e.target.value)} rows={5} placeholder={isCreator?"Таны бүтээлч замналыг товч танилцуулна уу...":"Өөрийгөө товч танилцуулна уу..."} style={{width:"100%",background:T.s1,border:`1px solid ${T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",resize:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
          <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:4,textAlign:"right"}}>{bio.length} тэмдэгт</div>
        </div>
        {isCreator&&<div style={{background:T.accentSub,border:`1px solid ${T.accentGlow}`,borderRadius:14,padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{color:T.accent,display:"flex"}}><IcCommission/></div>
            <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH}}>Захиалга авах уу?</div>
          </div>
          <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,lineHeight:1.6}}>Идэвхжүүлбэл бусад хүмүүс танд захиалга илгээх боломжтой болно. Дараа тохиргооноос өөрчилж болно.</div>
        </div>}
      </>}

      {step===2&&<>
        <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:14}}>Сонирхлын чиглэл сонгох</div>
        <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginBottom:16}}>2-оос дээш сонгоно уу. Энэ нь таны Feed-д нөлөөлнө.</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {suggestedTags.map(t=>{
            const sel = tags.includes(t);
            return <button key={t} onClick={()=>setTags(sel?tags.filter(x=>x!==t):[...tags,t])} style={{padding:"10px 18px",borderRadius:20,cursor:"pointer",fontFamily:"system-ui",fontSize:13,fontWeight:600,background:sel?T.accent:T.s1,border:`1.5px solid ${sel?T.accent:T.border}`,color:sel?"#fff":T.textSub,transition:"all .12s"}}>{t}</button>;
          })}
        </div>
        {tags.length>0&&<div style={{fontFamily:"system-ui",fontSize:12,color:T.accent,marginTop:12}}>{tags.length} сонгогдлоо</div>}
      </>}

      <div style={{height:20}}/>
    </div>

    <div style={{padding:"12px 20px 32px",borderTop:`1px solid ${T.border}`,display:"flex",gap:10}}>
      {step>0&&<PBtn full secondary onClick={()=>setStep(step-1)}>Буцах</PBtn>}
      <PBtn full loading={loading} onClick={()=>{
        if(step===0&&!GS.user.name.trim()){toast("Нэр оруулна уу","error");return;}
        if(step<2) setStep(step+1);
        else finish();
      }}>{step<2?"Дараах":"Дуусгах"}</PBtn>
    </div>
  </div>;
}
