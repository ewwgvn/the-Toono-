  </Simple>;
}

// ── ORDER DETAIL ──
function OrderDetail({nav, refresh, goBack}) {
  const order = GS.orders.find(o=>o.id===GS.selectedOrderId) || GS.orders?.[0] || {title:"—",creator:"—",price:0,status:"pending",date:"—"};
  const statusIdx = {"pending":0,"making":1,"shipped":2,"delivered":3,"done":4}[order.status]||0;
  const steps=[
    {label:"Захиалга баталгаажлаа",date:order.date||"—",done:statusIdx>=0},
    {label:"Үйлдвэрлэл эхэллээ",date:statusIdx>=1?"Хийгдэж байна":"",done:statusIdx>=1},
    {label:"Хүргэлт бэлтгэж байна",date:statusIdx>=2?"Бэлтгэж байна":"",done:statusIdx>=2},
    {label:"Хүргэгдэж байна",date:statusIdx>=3?"Хүргэгдлээ":"",done:statusIdx>=3},
    {label:"Хүргэлт дууссан",date:statusIdx>=4?"Дууссан":"",done:statusIdx>=4},
  ];
  return <Simple nav={nav} title="Захиалгын дэлгэрэнгүй" back="me" goBack={goBack}>
    <Crd style={{padding:"14px 16px",display:"flex",gap:14,alignItems:"center",marginBottom:20}}>
      <Avt size={52} color={T.accent}/>
      <div style={{flex:1}}>
        <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:2}}>{order.title}</div>
        <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{order.creator}</div>
      </div>
      <span style={{fontFamily:"system-ui",fontSize:11,fontWeight:700,color:T.accent,background:T.accentSub,padding:"4px 10px",borderRadius:8}}>{steps[statusIdx]?.label||"—"}</span>
    </Crd>
    {/* Order price + items */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontFamily:"system-ui",fontSize:22,fontWeight:800,color:T.accent}}>₮{(order.price||0).toLocaleString()}</div>
      <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{order.date}</div>
    </div>
    {order.items&&order.items.length>0&&<Crd style={{padding:"12px 16px",marginBottom:14}}>
      <div style={{fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.textSub,marginBottom:8}}>Захиалсан бүтээл</div>
      {order.items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<order.items.length-1?`1px solid ${T.border}`:"none"}}>
        <span style={{fontFamily:"system-ui",fontSize:13,color:T.textH}}>{it.title}{it.size?" · "+it.size:""}</span>
        <span style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textH}}>₮{(it.price||0).toLocaleString()}{(it.qty||1)>1?" ×"+it.qty:""}</span>
      </div>)}
    </Crd>}
    {/* Address */}
    {order.address&&<Crd style={{padding:"12px 16px",marginBottom:14}}>
      <div style={{fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.textSub,marginBottom:6}}>Хүргэлтийн хаяг</div>
      <div style={{fontFamily:"system-ui",fontSize:13,color:T.textH,lineHeight:1.6}}>{order.address.name} · {order.address.phone}<br/>{order.address.city} {order.address.district}<br/>{order.address.detail}</div>
      {order.address.memo&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:4}}>Тэмдэглэл: {order.address.memo}</div>}
    </Crd>}
    {/* Tracking number */}
    {order.tracking&&<Crd style={{padding:"12px 16px",marginBottom:14,background:T.greenSub,border:`1px solid ${T.green}30`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.green,marginBottom:4}}>Хүргэлтийн дугаар</div>
          <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,letterSpacing:".05em"}}>{order.tracking}</div>
        </div>
        <button onClick={()=>{navigator.clipboard?.writeText(order.tracking);toast("Дугаар хуулагдлаа","success");}} style={{background:T.green+"20",border:`1px solid ${T.green}40`,borderRadius:10,padding:"8px 14px",fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.green,cursor:"pointer"}}>Хуулах</button>
      </div>
    </Crd>}
    <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:14}}>Хүргэлт байдал</div>
    <Crd style={{padding:"20px 16px",marginBottom:18}}>
      {steps.map((s,i)=><div key={i} style={{display:"flex",gap:16,marginBottom:i<steps.length-1?20:0}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:s.done?T.accent:T.border,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {s.done&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
          </div>
          {i<steps.length-1&&<div style={{width:2,height:20,background:s.done&&steps[i+1].done?T.accent:T.border,marginTop:2}}/>}
        </div>
        <div style={{flex:1,paddingTop:2}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:s.done?700:500,color:s.done?T.textH:T.textSub}}>{s.label}</div>
          {s.date&&<div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:2}}>{s.date}</div>}
        </div>
      </div>)}
    </Crd>
    <div style={{display:"flex",gap:10}}>
      <PBtn full secondary onClick={()=>{GS.activeChatId=GS.conversations[0]?.id||null;nav("chatroom");}}>Бүтээлчтэй зурвасаар холбогдох</PBtn>
      <PBtn full secondary>Захиалга цуцлах</PBtn>
    </div>
    {statusIdx>=3&&<div style={{marginTop:16}}>
      <Crd style={{padding:"14px 16px",background:T.redSub,border:`1px solid ${T.red}30`}}>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.red,marginBottom:8}}>Асуудал гарсан уу?</div>
        <div style={{display:"flex",gap:8}}>
          <PBtn small danger onClick={()=>nav("return-request")}>Буцаалт / Солилт</PBtn>
          <PBtn small secondary onClick={()=>nav("dispute")}>Маргаан</PBtn>
        </div>
      </Crd>
    </div>}
    <Crd style={{padding:"14px 16px",marginTop:12,background:T.accentSub,border:`1px solid ${T.accent}30`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <IcShield/>
        <span style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.accent}}>Эскроу хамгаалалт</span>
      </div>
      <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,lineHeight:1.6}}>Таны төлбөр аюулгүй хадгалагдаж байна. Хүргэлт баталгаажсаны дараа бүтээлчид шилжинэ.</div>
    </Crd>
  </Simple>;
}

}

function Upload({nav}) {
  const [step,setStep]=useState(0);
  const [cat,setCat]=useState("");
  const [saleType,setSaleType]=useState("sale");
  const [loading,setLoading]=useState(false);
  const [mediaFiles,setMediaFiles]=useState([]);   // {type, url, name}
  const [videoFile,setVideoFile]=useState(null);
  const [cropWorkSrc,setCropWorkSrc]=useState(null);
  const [cropWorkIdx,setCropWorkIdx]=useState(-1);
  const [title,setTitle]=useState("");
  const [desc,setDesc]=useState("");
  const [price,setPrice]=useState("");
  const [stock,setStock]=useState("1");
  const [duration,setDuration]=useState("");
  const [material,setMaterial]=useState("");
  const [tags,setTags]=useState("");
  const cats=["Загвар","Нэхмэл","Урлаг","Орон зай","График","3D","Гэрэл зураг","Зурагт"];
  const stepL=["Зураг/Видео","Мэдээлэл","Үнэ·Борлуулалт"];

  // Image picker
  const handleImagePick = (e) => {
    const files = Array.from(e.target.files||[]);
    const valid = files.filter(f=>f.type.startsWith("image/")).slice(0, 10-mediaFiles.length);
    valid.forEach(f=>{
      const reader = new FileReader();
      reader.onload = ev => setMediaFiles(prev=>[...prev,{type:"image",url:ev.target.result,name:f.name}]);
      reader.readAsDataURL(f);
    });
  };

  // Video picker
  const handleVideoPick = (e) => {
    const f = e.target.files?.[0];
    if(!f||!f.type.startsWith("video/")) return;
    if(f.size > 200*1024*1024){ alert("Видео 200MB-аас бага байх ёстой"); return; }
    const reader = new FileReader();
    reader.onload = ev => setVideoFile({url:ev.target.result,name:f.name,size:(f.size/1024/1024).toFixed(1)});
    reader.readAsDataURL(f);
  };

  const removeMedia = (idx) => setMediaFiles(prev=>prev.filter((_,i)=>i!==idx));

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    {cropWorkSrc&&<ImageCropper src={cropWorkSrc} aspect="square" allowRatioChange={true} onDone={(cropped)=>{
      if(cropWorkIdx>=0) setMediaFiles(prev=>prev.map((f,i)=>i===cropWorkIdx?{...f,url:cropped}:f));
      else setMediaFiles(prev=>[...prev,{type:"image",url:cropped,name:"cropped.jpg"}]);
      setCropWorkSrc(null);setCropWorkIdx(-1);
    }} onCancel={()=>{setCropWorkSrc(null);setCropWorkIdx(-1);}}/>}
    <div style={{padding:"20px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>{
        if(step>0) setStep(step-1);
        else if(title||desc||mediaFiles.length>0) {
          if(window.confirm("Хадгалаагүй мэдээлэл байна. Гарах уу?")) nav("me");
        } else nav("me");
      }} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
      <div style={{fontFamily:"system-ui",fontSize:18,fontWeight:700,color:T.textH}}>Бүтээл байршуулах</div>
      <PBtn small secondary onClick={()=>toast("Түр хадгалагдлаа","success")}>Түр хадгалах</PBtn>
    </div>

    {/* Step indicator */}
    <div style={{display:"flex",borderBottom:`1px solid ${T.border}`}}>
      {stepL.map((s,i)=><button key={i} onClick={()=>setStep(i)} style={{flex:1,padding:"11px 0",background:"none",border:"none",fontFamily:"system-ui",fontSize:12,fontWeight:step===i?700:500,color:step===i?T.accent:T.textSub,borderBottom:`2px solid ${step===i?T.accent:"transparent"}`,cursor:"pointer"}}>{s}</button>)}
    </div>

    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"16px 20px 0"}}>

      {/* STEP 0: Media upload */}
      {step===0&&<>
        {/* Images */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH}}>Зураг</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{mediaFiles.length}/10</div>
          </div>

          {/* Media grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {mediaFiles.map((f,idx)=><div key={idx} style={{position:"relative",aspectRatio:"1",borderRadius:12,overflow:"hidden",background:T.s2}}>
              <img src={f.url} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}} onClick={()=>{setCropWorkIdx(idx);setCropWorkSrc(f.url);}}/>
              <button onClick={()=>removeMedia(idx)} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}><IcX/></button>
              <button onClick={()=>{setCropWorkIdx(idx);setCropWorkSrc(f.url);}} style={{position:"absolute",bottom:4,right:4,padding:"3px 8px",borderRadius:6,background:"rgba(0,0,0,0.6)",border:"none",fontFamily:"system-ui",fontSize:9,fontWeight:600,color:"#fff",cursor:"pointer"}}>✂ Тайрах</button>
              {idx===0&&<div style={{position:"absolute",bottom:4,left:4,background:T.accent,borderRadius:4,padding:"2px 6px",fontFamily:"system-ui",fontSize:9,fontWeight:700,color:"#fff"}}>Гол</div>}
            </div>)}

            {/* Add button */}
            {mediaFiles.length<10&&<label style={{aspectRatio:"1",borderRadius:12,background:T.s1,border:`2px dashed ${T.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:6}}>
              <div style={{width:36,height:36,borderRadius:10,background:T.accentSub,display:"flex",alignItems:"center",justifyContent:"center",color:T.accent,fontSize:22}}>+</div>
              <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub}}>Зураг нэмэх</div>
              <input type="file" accept="image/*" multiple onChange={handleImagePick} style={{display:"none"}}/>
            </label>}
          </div>
          <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:8}}>JPG, PNG, WEBP · Хамгийн ихдээ 10 зураг · Эхний зураг гол зураг болно</div>
        </div>

        {/* Video */}
        <div style={{marginBottom:20}}>

              <div style={{width:48,height:48,borderRadius:14,background:"rgba(224,80,80,0.12)",display:"flex",alignItems:"center",justifyContent:"center",color:T.red}}><IcVideo/></div>
              <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.textH}}>Видео нэмэх</div>
              <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,textAlign:"center"}}>MP4, MOV · Хамгийн ихдээ 200MB</div>

        <PBtn full onClick={()=>{if(mediaFiles.length===0){alert("Дор хаяж 1 зураг оруулна уу");return;}setStep(1);}}>Дараах → Мэдээлэл</PBtn>
      </>}

      {/* STEP 1: Details */}
      {step===1&&<>
        <Inp label="Бүтээлийн нэр *" placeholder="Гарчиг оруулна уу" value={title} onChange={e=>setTitle(e.target.value)}/>
        <div style={{marginBottom:14}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Тайлбар *</div>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Тайлбар, урам зориг, хийх арга..." style={{width:"100%",minHeight:100,background:T.s1,border:`1px solid ${T.border}`,borderRadius:13,padding:"12px 14px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",resize:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
          <div style={{textAlign:"right",fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:3}}>{desc.length} тэмдэгт</div>
        </div>
        <Inp label="Материал" placeholder="Тэмээний ноос 60%, хонины ноос 40%" value={material} onChange={e=>setMaterial(e.target.value)}/>
        <Inp label="Таг" placeholder="Тэнгэрийн шашин, Бөөгийн мөргөл, пальто" value={tags} onChange={e=>setTags(e.target.value)}/>
        <div style={{marginBottom:14}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:8}}>Ангилал *</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:"7px 15px",borderRadius:20,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,background:cat===c?T.accent:T.s1,border:`1px solid ${cat===c?T.accent:T.border}`,color:cat===c?"#fff":T.textSub}}>{c}</button>)}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:10}}>Нийтлэлийн төрөл</div>
          {[["sale","Борлуулалт боломжтой","Үнэ тохируулсны дараа зарах"],["portfolio","Зөвхөн портфолио","Зарахгүй нийтэлх"],["sample","Захиалгын жишээ","Захиалгын лавлагаа"]].map(t=><button key={t[0]} onClick={()=>setSaleType(t[0])} style={{width:"100%",background:saleType===t[0]?T.accentSub:T.s1,border:`1.5px solid ${saleType===t[0]?T.accent:T.border}`,borderRadius:13,padding:"13px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.textH}}>{t[1]}</div>
              <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginTop:2}}>{t[2]}</div>
            </div>
            {saleType===t[0]&&<span style={{color:T.accent}}><IcCheck/></span>}
          </button>)}
        </div>
        <PBtn full onClick={()=>{if(!title||!desc||!cat){alert("Нэр, тайлбар, ангилал бөглөнө үү");return;}setStep(2);}}>Дараах → Үнэ·Борлуулалт</PBtn>
      </>}

      {/* STEP 2: Price */}
      {step===2&&<>
        {saleType==="sale"&&<>
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Борлуулалтын үнэ (₮) *</div>
            <input value={price} onChange={e=>setPrice(e.target.value.replace(/[^0-9]/g,""))} placeholder="0" inputMode="numeric" style={{width:"100%",background:T.s1,border:`1px solid ${T.border}`,borderRadius:13,padding:"12px 16px",fontFamily:"system-ui",fontSize:26,fontWeight:700,color:T.accent,outline:"none",boxSizing:"border-box"}}/>
            {price&&<div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginTop:4}}>₮{Number(price).toLocaleString()}</div>}
          </div>
          <Inp label="Нөөцийн тоо" placeholder="1" value={stock} onChange={e=>setStock(e.target.value)}/>
          <Inp label="Хийх хугацаа" placeholder="Захиалгын дараа 3~4 долоо хоног" value={duration} onChange={e=>setDuration(e.target.value)}/>
        </>}

        {/* Preview summary */}
        <div style={{background:T.accentSub,border:`1px solid ${T.accentGlow}`,borderRadius:14,padding:"16px",marginBottom:16}}>
          <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.accent,marginBottom:12}}>Байршуулах бүтээлийн тойм</div>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            {mediaFiles[0]&&<img src={mediaFiles[0].url} alt="" style={{width:64,height:64,borderRadius:10,objectFit:"cover",flexShrink:0}}/>}
            <div style={{flex:1}}>
              <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:2}}>{title||"Бүтээлийн нэр"}</div>
              <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginBottom:6}}>{cat||"Ангилал"}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {price&&saleType==="sale"&&<Pill>₮{Number(price).toLocaleString()}</Pill>}
                {videoFile&&<Pill color={T.green}><span style={{display:"flex",marginRight:3}}><IcCheck/></span>Видео</Pill>}
                <Pill>{mediaFiles.length} зураг</Pill>
              </div>
            </div>
          </div>
        </div>

        <PBtn full loading={loading} onClick={()=>{
          if(saleType==="sale"&&!price){alert("Үнэ оруулна уу");return;}
          setLoading(true);
          setTimeout(()=>{
            const newWork = {
              id: Date.now(),
              title: title,
              cat: cat,
              year: new Date().getFullYear(),
              status: "published",
              price: saleType==="sale" ? Number(price) : 0,
              sales: 0,
              views: 0,
              likes: 0,
              digital: saleType==="sale" && !stock,
              medium: material || "—",
              dims: "—",
              tags: tags ? tags.split(",").map(t=>t.trim()).filter(Boolean) : [],
              accent: ["#3A6FD8","#8850D4","#3A9A60","#D45A30","#1A7AB0","#C05090"][Math.floor(Math.random()*6)],
              desc: desc,
              badge: saleType==="sale" ? null : saleType==="sample" ? "Захиалга" : null,
              sizes: [],
              colors: [],
              stock: Number(stock) || 1,
              creator: GS.user.name,
              cid: 1,
              images: mediaFiles.map(f=>f.url),
              video: videoFile ? videoFile.url : null,
            };
            newWork.creator = GS.user.name;
            newWork.cid = 1;
            newWork.material = newWork.medium || "—";
            newWork.sales = 0;
            newWork.views = 0;
            newWork.likes = 0;
            // Save to Supabase if connected
            if (isSupabaseReady() && GS.user.id) {
              DB.createWork({
                creator_id: GS.user.id,
                title: newWork.title,
                description: newWork.desc || "",
                category: newWork.cat || "",
                price: newWork.price || 0,
                material: newWork.material,
                medium: newWork.medium || "",
                dimensions: newWork.dims || "",
                tags: newWork.tags || [],
                sizes: newWork.sizes || [],
                colors: newWork.colors || [],
                images: newWork.images || [],
                video: newWork.video || null,
                digital: newWork.digital || false,
                stock: newWork.stock || 1,
                badge: newWork.badge || null,
                status: newWork.status || "published",
                accent: newWork.accent || "#5B8FE8",
              }).then(saved => {
                if (saved) newWork.id = saved.id;
              });
            }
            GS.myWorks.unshift(newWork);
            WORKS.unshift(newWork);
            GS.user.works = GS.myWorks.length;
            GS.notifications.unshift({
              id: Date.now(),
              icon: "upload",
              title: "Бүтээл байршлаа",
              desc: `"${title}" амжилттай нийтлэгдлээ.`,
              time: "Сая",
              read: true,
              to: "portfolio",
            });
            setLoading(false);
            saveGS();toast("Бүтээл амжилттай байршлаа","success");
            nav("me");
          },1800);
        }}>Бүтээл байршуулах</PBtn>
      </>}

      <div style={{height:30}}/>
    </div>
  </div>;
}


// ── COMM MANAGE ──
function CommManage({nav}) {
  const [tab,setTab]=useState("pending");
  const [,setTick]=useState(0);
  const stepL=["Захиалга Зөвшөөрөх","Ажил эхлэх","Хүргэлтэд бэлтгэх","Дууссан"];
  const allPending = GS.receivedCommissions.filter(c=>c.status==="pending");
  const ongoing = GS.receivedCommissions.filter(c=>c.status==="ongoing"||c.status==="accepted");
  const done = GS.receivedCommissions.filter(c=>c.status==="done"||c.status==="delivered");

  const acceptComm = (r) => {
    GS.receivedCommissions = GS.receivedCommissions.map(c=>c.id===r.id?{...c,status:"ongoing"}:c);
    GS.notifications.unshift({id:Date.now(),icon:"comm",title:"Захиалга зөвшөөрөгдлөө",desc:`${r.buyer}-ын захиалгыг зөвшөөрлөө.`,time:"Сая",read:true,to:"comm-manage"});
    setTick(t=>t+1);
    toast("Захиалга зөвшөөрөгдлөө","success");
  };
  const rejectComm = (r) => {
    GS.receivedCommissions = GS.receivedCommissions.filter(c=>c.id!==r.id);
    setTick(t=>t+1);
    toast("Захиалга татгалзлаа","info");
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",gap:10}}>
      <button onClick={()=>nav("me")} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
      <div style={{fontFamily:"system-ui",fontSize:20,fontWeight:800,color:T.textH}}>Захиалга удирдах</div>
    </div>
    <div style={{display:"flex",borderBottom:`1px solid ${T.border}`}}>
      {[["pending","Хүлээгдэж байна "+allPending.length],["ongoing","Явагдаж байна "+ongoing.length],["done","Дууссан "+done.length]].map(t=><button key={t[0]} onClick={()=>setTab(t[0])} style={{flex:1,padding:"12px 0",background:"none",border:"none",fontFamily:"system-ui",fontSize:13,fontWeight:tab===t[0]?700:500,color:tab===t[0]?T.accent:T.textSub,borderBottom:`2px solid ${tab===t[0]?T.accent:"transparent"}`,cursor:"pointer"}}>{t[1]}</button>)}
    </div>
    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"14px 20px 0"}}>
      {tab==="pending"&&(allPending.length===0
        ?<Empty icon={<IcCommission/>} title="Хүлээгдэж буй захиалга байхгүй"/>
        :allPending.map(r=><Crd key={r.id} style={{padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:2}}>{r.buyer}</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{r.type} · {r.date}</div>
          </div>
          <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.accent}}>{r.budget}</div>
        </div>
        <Crd style={{padding:"10px 12px",marginBottom:12,background:T.s2,border:"none",fontFamily:"system-ui",fontSize:13,color:T.textB,lineHeight:1.5}}>{r.msg}</Crd>
        <div style={{display:"flex",gap:8}}>
          <PBtn full secondary danger onClick={()=>rejectComm(r)}>Татгалзах</PBtn>
          <PBtn full secondary onClick={()=>{GS.activeChatId=GS.conversations[0]?.id||null;nav("chatroom");}}>Асуулт</PBtn>
          <PBtn full onClick={()=>acceptComm(r)}>Зөвшөөрөх</PBtn>
        </div>
      </Crd>))}
      {tab==="ongoing"&&ongoing.map(r=><Crd key={r.id} style={{padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:2}}>{r.buyer}</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{r.type}</div>
          </div>
          <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.green}}>{r.budget}</div>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          {stepL.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<r.step?T.accent:T.border}}/>)}
        </div>
        <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginBottom:12}}>{stepL[r.step-1]}</div>
        <div style={{display:"flex",gap:8}}>
          <PBtn full secondary onClick={()=>{GS.activeChatId=GS.conversations[0]?.id||null;nav("chatroom");}}>Харилцаа</PBtn>
          {r.step<4&&<PBtn full onClick={()=>toast("Дараагийн шатанд шилжлээ","success")}>Дараах шат</PBtn>}
        </div>
      </Crd>)}
      {tab==="done"&&done.map(r=><Crd key={r.id} style={{padding:"14px 16px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:2}}>{r.buyer}</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{r.type} · {r.date}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.green}}>{r.budget}</div>
            <IcStar n={r.rating}/>
          </div>
        </div>
      </Crd>)}
      <div style={{height:30}}/>
    </div>
  </div>;
}

// ── REVIEW WRITE ──
function ReviewWrite({nav}) {
  const [rating,setRating]=useState(0);
  const [hover,setHover]=useState(0);
  const [text,setText]=useState("");
  const [kwtags,setKwtags]=useState(new Set());
  const kwList=["Маш өндөр чанар","Зурагтай адил","Савлагаа сайн","Хурдан хийсэн","Харилцаа сайн","Дахин худалдаж авна"];
  const rLabels=["","Муу байна","Дунд зэрэг","Дунд","Сайн","Гайхалтай!"];

  const reviewOrder = GS.orders.find(o=>o.canReview||o.status==="delivered") || GS.orders[0] || {title:"—",creator:"—"};
  return <Simple nav={nav} title="Үнэлгээ бичих" back="me">
    <Crd style={{padding:"13px 16px",display:"flex",gap:14,alignItems:"center",marginBottom:24}}>
      <Avt size={48} color={T.accent}/>
      <div>
        <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH}}>{reviewOrder.title}</div>
        <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{reviewOrder.creator}</div>
      </div>
    </Crd>
    <div style={{textAlign:"center",marginBottom:24}}>
      <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:14}}>Сэтгэл ханамж</div>
      <div style={{display:"flex",justifyContent:"center",gap:8}}>
        {[1,2,3,4,5].map(i=><button key={i} onClick={()=>setRating(i)} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(0)} style={{background:"none",border:"none",cursor:"pointer",padding:2,color:(hover||rating)>=i?T.yellow:T.textDim,transition:"all .1s",transform:(hover||rating)>=i?"scale(1.15)":"scale(1)"}}><svg width="32" height="32" viewBox="0 0 28 28" fill={(hover||rating)>=i?T.yellow:"none"} stroke={(hover||rating)>=i?T.yellow:T.textDim} strokeWidth="1.4"><path d="M14 3L16.8 10.4H24.6L18.4 15L20.8 22.4L14 18L7.2 22.4L9.6 15L3.4 10.4H11.2L14 3Z" strokeLinejoin="round"/></svg></button>)}
      </div>
      {rating>0&&<div style={{fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.yellow,marginTop:10}}>{rLabels[rating]}</div>}
    </div>
    <div style={{marginBottom:14}}>
      <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:8}}>Дэлгэрэнгүй үнэлгээ</div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Санаагаа бичнэ үү..." style={{width:"100%",minHeight:120,background:T.s1,border:`1px solid ${T.border}`,borderRadius:13,padding:"13px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",resize:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
      <div style={{textAlign:"right",fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:3}}>{text.length} тэмдэгт</div>
    </div>
    <div style={{marginBottom:20}}>
      <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:10}}>Түлхүүр үг</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {kwList.map(t=>{const sel=kwtags.has(t);return <button key={t} onClick={()=>{const n=new Set(kwtags);sel?n.delete(t):n.add(t);setKwtags(n);}} style={{padding:"8px 14px",borderRadius:20,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,background:sel?T.accentSub:T.s1,border:`1px solid ${sel?T.accent:T.border}`,color:sel?T.accent:T.textSub}}>{t}</button>;})}
      </div>
    </div>
    <PBtn full disabled={rating===0||text.length<5} onClick={()=>{
      GS.notifications.unshift({id:Date.now(),icon:"like",title:"Үнэлгээ нэмэгдлээ",desc:rating+"★ "+text.slice(0,30)+"...",time:"Сая",read:true,to:"me"});
      GS.unreadNotif++;
      nav("me");toast("Үнэлгээ нэмэгдлээ. Баярлалаа!","success");
    }}  disabled={rating===0}>Үнэлгээ нэмэх</PBtn>
  </Simple>;
}

// ── REPORT ──
function Report({nav}) {
  const [step,setStep]=useState(0);
  const types=[["fake",<IcWarning/>,"Худал мэдээлэл·Луйвар"],["copy",<IcLock/>,"Зохиогчийн эрх зөрчих·Хулгай"],["spam",<IcReport/>,"Спам·Сурталчилгааны агуулга"],["hate",<IcFilter/>,"Үзэн ядалтын илэрхийлэл"],["privacy",<IcShield/>,"Хувийн мэдээллийн зөрчил"],["etc",<IcDots/>,"Бусад"]];

  return <Simple nav={nav} title="Гомдол" back="work">
    {step===0&&<>
      <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:5}}>Гомдлын төрөл</div>
      <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginBottom:16}}>Худал гомдол гаргавал бүртгэлд арга хэмжээ авах боломжтой.</div>
      {types.map(t=><Crd key={t[0]} onClick={()=>setStep(1)} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:14,marginBottom:10,cursor:"pointer"}}>
        <div style={{fontSize:22,flexShrink:0}}>{t[1]}</div>
        <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.textH,flex:1}}>{t[2]}</div>
        <span style={{color:T.textSub}}><IcChevron/></span>
      </Crd>)}

// ── MAIN APP ──
function App() {
  const [screen,setScreen]=useState("splash");
  const [history, setHistory] = useState([]);
  // Splash → onboarding auto-transition
  const [tab,setTab]=useState("home");
  const [,setTick]=useState(0);
  const [selectedWorkId,setSelectedWorkId]=useState(null);
  const [selectedCreatorId,setSelectedCreatorId]=useState(null);
  const refresh=useCallback(()=>{
    // Sync badge counters from actual data
    GS.unreadChat = getUnreadChat();
    GS.unreadNotif = getUnreadNotif();
    setTick(t=>t+1);
    // Persist state asynchronously
    saveGS();
  },[]);
  useEffect(()=>{
    const init = async () => {
      // Version check — clear stale data on app update
      const APP_VERSION = "2.0.0";
      try {
        const savedVer = localStorage.getItem("toono-version");
        if (savedVer !== APP_VERSION) {
          // New version — clear all cached data for fresh start
          localStorage.removeItem("toono-app-state");
          localStorage.removeItem("toono-storage");
          try { await window.storage.delete("toono-app-state"); } catch(e) {}
          localStorage.setItem("toono-version", APP_VERSION);
          resetGS();
        }
      } catch(e) {}

      // 1. Try Supabase session
      initSupabase();
      if (isSupabaseReady()) {
        const session = await DB.getSession();
        if (session) {
          const synced = await syncFromSupabase();
          if (synced) { setScreen("main"); return; }
        }
      }
      // 2. Fallback to localStorage
      const loaded = await loadGS();
      if(loaded && GS.isLoggedIn && GS.user.name) {
        setScreen("main");
      } else {
        await new Promise(r=>setTimeout(r,1500));
        if(GS.isLoggedIn && GS.user.name) setScreen("main");
        else { resetGS(); setScreen("onboarding"); }
      }
    };
    init();
  },[]);

  const nav=useCallback((s,data)=>{
    const tabs={home:1,explore:1,chat:1,me:1};
    if(data?.workId!==undefined) setSelectedWorkId(data.workId);
    if(data?.creatorId!==undefined) setSelectedCreatorId(data.creatorId);
    // Auth guard — must be logged in to access main tabs & protected screens
    const protectedScreens={upload:1,checkout:1,commission:1,cart:1,"order-list":1,"order-detail":1,
      "edit-profile":1,settings:1,dashboard:1,portfolio:1,"comm-manage":1,saved:1,follows:1,
      referral:1,dispute:1,"return-request":1,"review-write":1,feed:1,notifications:1,"profile-setup":1};
    if((tabs[s]||protectedScreens[s])&&!GS.isLoggedIn){setScreen("login");return;}
    // Scroll to top on every navigation
    requestAnimationFrame(()=>{
      document.querySelectorAll('[style*="overflow"]').forEach(el=>{try{el.scrollTop=0;}catch(e){}});
    });
    if(tabs[s]){
      setTab(s);
      setScreen("main");
      setHistory([]);
    } else {
      setHistory(h=>[...h, screen]);
      setScreen(s);
    }
  },[screen]);
  const goBack=useCallback(()=>{
    if(history.length>0){
      setScreen(history[history.length-1]);
      setHistory(h=>h.slice(0,-1));
    } else {
      setTab("home"); setScreen("main");
    }
  },[history]);

  const p={nav,refresh,goBack};

  const renderScreen=()=>{
    if(screen==="splash")       return <Splash/>;
    if(screen==="onboarding")   return <Onboarding nav={nav} onDone={()=>nav("home")}/>;
    if(screen==="login")        return <Login nav={nav}/>;
    if(screen==="profile-setup") return <ProfileSetup nav={nav} refresh={refresh} goBack={goBack}/>;
    if(screen==="work")         return <WorkDetail {...p} workId={selectedWorkId}/>;
    if(screen==="profile")      return <CreatorProfile {...p} creatorId={selectedCreatorId}/>;
    if(screen==="commission")   return <CommissionScreen nav={nav} goBack={goBack}/>;
    if(screen==="checkout")     return <Checkout nav={nav} refresh={refresh} goBack={goBack} workId={selectedWorkId}/>;
    if(screen==="chatroom")     return <ChatRoom nav={nav} refresh={refresh}/>;
    if(screen==="order-detail") return <OrderDetail {...p}/>;
    if(screen==="order-list")   return <OrderList nav={nav} refresh={refresh} goBack={goBack}/>;
    if(screen==="notifications")return <Notifications {...p}/>;
    if(screen==="settings")     return <Settings nav={nav}/>;
    if(screen==="edit-profile") return <EditProfile nav={nav} refresh={refresh}/>;
    if(screen==="dashboard")    return <Dashboard nav={nav}/>;
    if(screen==="saved")        return <SavedWorks {...p}/>;
    if(screen==="follows")      return <FollowList {...p}/>;
    // if(screen==="events")       return <Events nav={nav}/>;
    // if(screen==="b2b")          return <B2B nav={nav}/>;
    if(screen==="upload")       return <Upload nav={nav} refresh={refresh}/>;
    if(screen==="comm-manage")  return <CommManage {...p}/>;
    if(screen==="review-write") return <ReviewWrite nav={nav}/>;
    if(screen==="report")       return <Report nav={nav}/>;
    if(screen==="portfolio")    return <Portfolio {...p}/>;
    if(screen==="cart")         return <CartScreen nav={nav} refresh={refresh}/>;

    if(screen==="referral")     return <ReferralScreen nav={nav}/>;
    if(screen==="feed")         return <FeedScreen nav={nav} refresh={refresh} goBack={goBack}/>;
    if(screen==="terms")        return <TermsScreen nav={nav}/>;
    if(screen==="privacy")      return <PrivacyScreen nav={nav}/>;
    if(screen==="return-request") return <ReturnRequest {...p}/>;
    if(tab==="explore")         return <Explore {...p}/>;

    if(tab==="me")              return <MyProfile {...p}/>;

    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@600&display=swap');
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
      input, textarea, button { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; }
      body { background: #08090E; font-family: 'DM Sans', system-ui, sans-serif; }
      button:active { opacity: 0.75; }

      /* ── MOBILE FIRST (default) ── */
      .toono-mobile-nav { display:flex; }

        .toono-content { max-width:1200px; }
      }

    {/* ── DESKTOP TOP NAV ── */}

      <div style={{maxWidth:1200,width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",height:64}}>

          </div>
          <div style={{display:"flex",gap:6}}>
            {[["home","Нүүр"],["explore","Хайлт"],["feed","Фийд"]].map(([id,label])=>
              <button key={id} onClick={()=>nav(id)} style={{background:tab===id?T.accentSub:"transparent",border:`1px solid ${tab===id?T.accent+"40":"transparent"}`,borderRadius:10,padding:"8px 16px",fontFamily:"'DM Sans',system-ui",fontSize:14,fontWeight:tab===id?600:400,color:tab===id?T.accent:T.textSub,cursor:"pointer",transition:"all .2s"}}>{label}</button>

          </div>
        </div>
        <div style={{flex:1,maxWidth:400,margin:"0 24px"}}>

// ── CART SCREEN (TikTok Shop / Etsy style) ──
function CartScreen({nav, refresh}) {
  const [coupon,setCoupon]=useState("");
  const [couponApplied,setCouponApplied]=useState(false);
  const [couponDiscount,setCouponDiscount]=useState(0);
  const [qty,setQty]=useState({});

  // Use GS.cart, falling back to demo items if empty
  const cartItems = GS.cart.filter((item, index, self) => self.findIndex(i=>i.id===item.id)===index);
  const getQty = (id) => qty[id] || 1;
  const subtotal = cartItems.reduce((s,it)=>s+(it.price*getQty(it.id)),0);
  const discount = couponApplied ? Math.floor(subtotal*couponDiscount) : 0;
  const shipping = cartItems.some(i=>!i.digital) ? 15000 : 0;
  const total = subtotal - discount + shipping;

  const applyCoupon = ()=>{
    const codes={"THETOONO10":.10,"MONGOL20":.20,"FIRST15":.15};
    if(codes[coupon.toUpperCase()]){
      setCouponDiscount(codes[coupon.toUpperCase()]);
      setCouponApplied(true);
      toast("Купон хэрэглэгдлээ! "+Math.round(codes[coupon.toUpperCase()]*100)+"% хөнгөлөлт","success");
    } else {
      toast("Купон буруу байна","error");
    }
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>nav("home")} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
      <div style={{fontFamily:"system-ui",fontSize:20,fontWeight:800,color:T.textH}}>Сагс</div>
      <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>{cartItems.length} бүтээл</div>
    </div>

    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"0 20px"}}>
      {cartItems.length===0
        ?<Empty icon={<IcCartEmpty/>} title="Сагс хоосон байна" sub="Таалагдсан бүтээлийг сагсанд нэмнэ үү" action="Бүтээл хайх" onAction={()=>nav("explore")}/>
        :<>
          {cartItems.map(item=><Crd key={item.id} style={{marginBottom:12,padding:0,overflow:"hidden"}}>
            <div style={{display:"flex",gap:0}}>
              <div style={{width:90,background:item.accent+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,position:"relative"}}>
                <Toono size={48} color={item.accent}/>
                {item.digital&&<div style={{position:"absolute",bottom:6,left:"50%",transform:"translateX(-50%)",background:"rgba(136,80,212,0.9)",borderRadius:6,padding:"2px 6px",fontFamily:"system-ui",fontSize:8,fontWeight:700,color:"#fff"}}><svg width="9" height="10" viewBox="0 0 9 10" fill="none"><path d="M4.5 1V7M1.5 4.5L4.5 7.5L7.5 4.5" stroke="white" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/><path d="M1 9H8" stroke="white" strokeWidth="1.2" strokeLinecap="round"/></svg> Дижитал</div>}
              </div>
              <div style={{flex:1,padding:"12px 14px"}}>
                <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:3}}>{item.title}</div>
                <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginBottom:6}}>{item.creator}</div>
                {(item.size||item.color)&&<div style={{display:"flex",gap:6,marginBottom:8}}>
                  {item.size&&<span style={{fontFamily:"system-ui",fontSize:11,color:T.accent,background:T.accentSub,padding:"2px 8px",borderRadius:6}}><IcFilter/> {item.size}</span>}
                  {item.color&&<span style={{fontFamily:"system-ui",fontSize:11,color:T.accent,background:T.accentSub,padding:"2px 8px",borderRadius:6}}><svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="4" stroke="currentColor" strokeWidth="1" fill="none"/><circle cx="5" cy="5" r="1.8"/></svg> {item.color}</span>}
                </div>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.accent}}>₮{(item.price*getQty(item.id)).toLocaleString()}</div>
                  {!item.digital&&<div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setQty(q=>({...q,[item.id]:Math.max(1,getQty(item.id)-1)}))} style={{width:28,height:28,borderRadius:8,background:T.s2,border:`1px solid ${T.border}`,color:T.textH,cursor:"pointer",fontFamily:"system-ui",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,minWidth:16,textAlign:"center"}}>{getQty(item.id)}</span>
                    <button onClick={()=>setQty(q=>({...q,[item.id]:Math.min(item.stock,getQty(item.id)+1)}))} style={{width:28,height:28,borderRadius:8,background:T.s2,border:`1px solid ${T.border}`,color:T.textH,cursor:"pointer",fontFamily:"system-ui",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>}
                </div>
              </div>
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,padding:"8px 14px",display:"flex",justifyContent:"space-between"}}>
              <button onClick={()=>{GS.saved.add(item.id);GS.cart=GS.cart.filter(c=>c.id!==item.id);refresh();toast("Хадгалсан руу шилжлээ","success");}} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:12,color:T.accent,cursor:"pointer"}}><span style={{display:"flex"}}><IcBookmark/></span> Хадгалах</button>
              <button onClick={()=>{GS.cart=GS.cart.filter(c=>c.id!==item.id);refresh();toast("Сагснаас хасагдлаа","info");}} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:12,color:T.red,cursor:"pointer"}}><span style={{display:"flex"}}><IcTrash/></span> Хасах</button>
            </div>
          </Crd>)}

          {/* Coupon */}
          <Crd style={{padding:"14px",marginBottom:16}}>
            <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.textH,marginBottom:10}}><span style={{display:"flex",marginRight:4}}><IcCoupon/></span>Купон хэрэглэх</div>
            <div style={{display:"flex",gap:8}}>
              <input value={coupon} onChange={e=>setCoupon(e.target.value.toUpperCase())} placeholder="THETOONO10 · MONGOL20 · FIRST15" disabled={couponApplied} style={{flex:1,background:T.s2,border:`1px solid ${couponApplied?T.green:T.border}`,borderRadius:11,padding:"10px 14px",fontFamily:"monospace",fontSize:13,color:T.textH,outline:"none"}}/>
              <PBtn small onClick={applyCoupon} disabled={couponApplied}>{couponApplied?"OK":"Хэрэглэх"}</PBtn>
            </div>
            {couponApplied&&<div style={{fontFamily:"system-ui",fontSize:12,color:T.green,marginTop:6}}><span style={{display:"flex",marginRight:4}}><IcCheck/></span>{Math.round(couponDiscount*100)}% хөнгөлөлт хэрэглэгдлээ</div>}
          </Crd>

          {/* Order summary */}
          <Crd style={{padding:"16px",marginBottom:16}}>
            <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:12}}>Захиалгын дүн</div>
            {[
              ["Барааны дүн","₮"+subtotal.toLocaleString()],
              ...(couponApplied?[["Купон хөнгөлөлт","-₮"+discount.toLocaleString()]]:[]),
              ["Хүргэлт",shipping===0?"Үнэгүй":"₮"+shipping.toLocaleString()],
            ].map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>{r[0]}</span>
              <span style={{fontFamily:"system-ui",fontSize:13,color:r[0].includes("хөнгөлөлт")?T.green:T.textH}}>{r[1]}</span>
            </div>)}
            <div style={{height:1,background:T.border,margin:"8px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH}}>Нийт дүн</span>
              <span style={{fontFamily:"system-ui",fontSize:18,fontWeight:800,color:T.accent}}>₮{total.toLocaleString()}</span>
            </div>
          </Crd>
        </>}
      <div style={{height:20}}/>
    </div>

    {cartItems.length>0&&<div style={{padding:"12px 20px 32px",borderTop:`1px solid ${T.border}`}}>
      <PBtn full disabled={cartItems.length===0} onClick={()=>{GS.directBuyItem=null;nav("checkout");}}>Захиалах — ₮{total.toLocaleString()}</PBtn>
    </div>}
  </div>;
}

        <div style={{display:"flex",gap:10}}>

    <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.textH,marginBottom:10}}>Урьсан найзуудын жагсаалт</div>
    {history.map((h,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
      <div>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textH}}>{h.name}</div>
        <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub}}>{h.date}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:h.reward>0?T.green:T.textSub}}>{h.reward>0?"+₮"+h.reward.toLocaleString():"–"}</div>
        <div style={{fontFamily:"system-ui",fontSize:10,color:T.textSub}}>{h.status}</div>
      </div>
    </div>)}
  </Simple>;
}

// Бүтээлчийн архив — бүтээлийн бүрэн цомог
// ══════════════════════════════════════════════
function Portfolio({nav, goBack}) {
  const [view,setView]=useState("grid");         // grid | list | timeline
  const [filter,setFilter]=useState("all");       // all | published | draft | archived | digital
  const [sort,setSort]=useState("newest");        // newest | oldest | popular | price
  const [selected,setSelected]=useState(new Set()); // multi-select for bulk
  const [bulkMode,setBulkMode]=useState(false);
  const [search,setSearch]=useState("");
  const [activeWork,setActiveWork]=useState(null); // detail modal

  // Works data
  const allWorks = GS.myWorks.length > 0 ? GS.myWorks : [];

  const cats = ["all","Загвар","График","Урлаг","Нэхмэл","3D"];
  const statusCfg = {
    published:{label:"Нийтлэгдсэн",color:T.green,  bg:T.greenSub},
    draft:    {label:"Ноорог",       color:T.yellow, bg:"rgba(240,160,48,0.14)"},
    archived: {label:"Архив",        color:T.textSub,bg:T.s2},
    digital:  {label:"Дижитал",      color:"#8850D4",bg:"rgba(136,80,212,0.14)"},
  };

  // Filter
  const filtered = allWorks.filter(w=>{
    if(filter!=="all" && filter!=="digital" && w.status!==filter) return false;
    if(filter==="digital" && !w.digital) return false;
    if(search && !w.title.toLowerCase().includes(search.toLowerCase()) &&
       !w.tags.some(t=>t.toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  }).sort((a,b)=>{
    if(sort==="newest") return b.year-a.year || b.id-a.id;
    if(sort==="oldest") return a.year-b.year || a.id-b.id;
    if(sort==="popular") return b.likes-a.likes;
    if(sort==="price") return b.price-a.price;
    return 0;
  });

  // Stats
  const stats = {
    total: allWorks.length,
    published: allWorks.filter(w=>w.status==="published").length,
    sales: allWorks.reduce((s,w)=>s+w.sales,0),
    views: allWorks.reduce((s,w)=>s+w.views,0),
    likes: allWorks.reduce((s,w)=>s+w.likes,0),
  };

  const toggleSelect = (id) => {
    const n = new Set(selected);
    n.has(id)?n.delete(id):n.add(id);
    setSelected(n);
  };

  // Group by year (timeline)
  const byYear = filtered.reduce((acc,w)=>{
    if(!acc[w.year]) acc[w.year]=[];
    acc[w.year].push(w);
    return acc;
  }, {});

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>

    {/* Header */}
    <div style={{padding:"20px 20px 12px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>goBack?goBack():nav("me")} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
          <div>
            <div style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:600,color:T.textH,letterSpacing:"-.01em"}}>Архив</div>
            <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginTop:2}}>Миний бүтээлийн архив</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {bulkMode
            ?<><button onClick={()=>{setBulkMode(false);setSelected(new Set());}} style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 14px",fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.textSub,cursor:"pointer"}}>Цуцлах</button>
              {selected.size>0&&<PBtn small danger onClick={()=>{toast(selected.size+"ш бүтээл архивлагдлаа","success");setBulkMode(false);setSelected(new Set());}}>Архивлах ({selected.size})</PBtn>}</>
            :<><button onClick={()=>nav("upload")} style={{width:38,height:38,borderRadius:"50%",background:T.accent,border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
              </button>
              <button onClick={()=>setBulkMode(true)} style={{width:38,height:38,borderRadius:"50%",background:T.s1,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.textSub}}>
                <IcDots/>
              </button></>}
        </div>
      </div>

      {/* Stats summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[
          {v:stats.total,     l:"Нийт",     color:T.textH},
          {v:stats.published, l:"Нийтлэгдсэн",color:T.green},
          {v:stats.sales+"ш", l:"Борлуулалт",color:T.accent},
          {v:(stats.views/1000).toFixed(1)+"K",l:"Үзэлт",color:T.yellow},
        ].map((s,i)=><div key={i} style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 0",textAlign:"center"}}>
          <div style={{fontFamily:"system-ui",fontSize:17,fontWeight:800,color:s.color}}>{s.v}</div>
          <div style={{fontFamily:"system-ui",fontSize:10,color:T.textSub,marginTop:2}}>{s.l}</div>
        </div>)}
      </div>

      {/* Search */}
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:13,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <IcSearch/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Бүтээл, таг хайх..." style={{background:"none",border:"none",outline:"none",fontFamily:"system-ui",fontSize:14,color:T.textH,flex:1}}/>
        {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:T.textSub,display:"flex"}}><IcX/></button>}
      </div>
    </div>

    {/* Filter toolbar */}
    <div style={{padding:"0 20px 10px",flexShrink:0}}>
      {/* Status filter */}
      <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",marginBottom:10}}>
        {[
          ["all","Бүгд ("+allWorks.length+")"],
          ["published","Нийтлэгдсэн"],
          ["draft","Ноорог"],
          ["archived","Архив"],
          ["digital","Дижитал"],
        ].map(f=><button key={f[0]} onClick={()=>setFilter(f[0])} style={{flexShrink:0,padding:"6px 13px",borderRadius:20,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,background:filter===f[0]?T.accent:T.s1,border:`1px solid ${filter===f[0]?T.accent:T.border}`,color:filter===f[0]?"#fff":T.textSub,transition:"all .15s"}}>{f[1]}</button>)}
      </div>

      {/* View/Sort */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{filtered.length} бүтээл</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {/* Sort */}
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 10px",fontFamily:"system-ui",fontSize:12,color:T.textSub,outline:"none",cursor:"pointer"}}>
            <option value="newest">Шинэ</option>

          {/* View toggle */}
          {[
            ["grid",  <svg key="g" width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" strokeWidth="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" strokeWidth="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" strokeWidth="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" strokeWidth="1.3"/></svg>],
            ["list",  <svg key="l" width="14" height="14" viewBox="0 0 16 16" fill="none"><line x1="1" y1="4"  x2="15" y2="4"  stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="1" y1="8"  x2="15" y2="8"  stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="1" y1="12" x2="15" y2="12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>],
            ["timeline",<svg key="t" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="3" cy="4" r="2" stroke="currentColor" strokeWidth="1.3"/><circle cx="3" cy="12" r="2" stroke="currentColor" strokeWidth="1.3"/><line x1="3" y1="6" x2="3" y2="10" stroke="currentColor" strokeWidth="1.3"/><line x1="6" y1="4" x2="15" y2="4" stroke="currentColor" strokeWidth="1.3"/><line x1="6" y1="12" x2="15" y2="12" stroke="currentColor" strokeWidth="1.3"/></svg>],
          ].map(([v,icon])=><button key={v} onClick={()=>setView(v)} style={{width:32,height:32,borderRadius:8,background:view===v?T.accent:T.s1,border:`1px solid ${view===v?T.accent:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:view===v?"#fff":T.textSub}}>{icon}</button>)}

    {/* Content */}

      {filtered.length===0&&<Empty icon={<IcFolderEmpty/>} title="Бүтээл олдсонгүй" sub="Хайлтаа өөрчилж үзнэ үү"/>}

          const sc = statusCfg[w.digital?"digital":w.status];
          return <div key={w.id}
            onClick={()=>bulkMode?toggleSelect(w.id):setActiveWork(w)}

            {w.images?.[0] ? <img src={w.images[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/> : <Toono size={38} color={w.accent}/>}
            <div style={{fontFamily:"system-ui",fontSize:9,fontWeight:700,color:T.textSub,textAlign:"center",padding:"0 4px",lineHeight:1.3}}>{w.title.length>18?w.title.slice(0,17)+"…":w.title}</div>

                <span style={{fontFamily:"system-ui",fontSize:10,color:T.textSub}}><IcEye/> {w.views.toLocaleString()}</span>
                <span style={{fontFamily:"system-ui",fontSize:10,color:T.textSub}}><IcHeart/> {w.likes}</span>
                {w.sales>0&&<span style={{fontFamily:"system-ui",fontSize:10,color:T.green}}><IcStats/> {w.sales}ш</span>}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:w.price>0?T.accent:T.textSub}}>
                {w.price>0?"₮"+(w.price/1000).toFixed(0)+"K":"–"}
              </div>
              <button onClick={e=>{e.stopPropagation();setActiveWork(w);}} style={{background:"none",border:"none",cursor:"pointer",color:T.textSub,marginTop:4,display:"flex"}}>
                <IcChevron/>
              </button>
            </div>
          </div>;
        })}
      </div>}

      {/* TIMELINE VIEW */}
      {view==="timeline"&&<div style={{paddingTop:8}}>
        {Object.keys(byYear).sort((a,b)=>+b-+a).map(year=><div key={year} style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:600,color:T.accent}}>{year}</div>
            <div style={{flex:1,height:1,background:T.accentGlow}}/>
            <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub}}>{byYear[+year].length}ш</div>
          </div>
          <div style={{paddingLeft:16,borderLeft:`2px solid ${T.accentGlow}`}}>
            {byYear[+year].map((w,idx)=>{
              const sc = statusCfg[w.digital?"digital":w.status];
              return <div key={w.id} onClick={()=>setActiveWork(w)} style={{position:"relative",marginBottom:16,cursor:"pointer"}}>
                {/* Timeline dot */}
                <div style={{position:"absolute",left:-22,top:16,width:12,height:12,borderRadius:"50%",background:w.accent,border:`2px solid ${T.bg}`}}/>
                <Crd style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{width:52,height:52,borderRadius:12,background:w.accent+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Toono size={30} color={w.accent}/></div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                        <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH}}>{w.title}</div>
                        <span style={{fontFamily:"system-ui",fontSize:9,fontWeight:700,color:sc.color,background:sc.bg,padding:"2px 7px",borderRadius:6,flexShrink:0,marginLeft:8}}>{sc.label}</span>
                      </div>
                      <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginBottom:6}}>{w.cat} · {w.medium}</div>
                      <div style={{display:"flex",gap:10}}>
                        <span style={{fontFamily:"system-ui",fontSize:11,color:T.textSub}}><IcEye/> {w.views.toLocaleString()}</span>
                        <span style={{fontFamily:"system-ui",fontSize:11,color:T.textSub}}><IcHeart/> {w.likes}</span>
                        {w.price>0&&<span style={{fontFamily:"system-ui",fontSize:11,fontWeight:700,color:T.accent}}>₮{(w.price/1000).toFixed(0)}K</span>}
                        {w.digital&&<DigitalBadge/>}
                      </div>
                      {w.tags.length>0&&<div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
                        {w.tags.slice(0,3).map(t=><span key={t} style={{fontFamily:"system-ui",fontSize:9,color:T.accent,background:T.accentSub,padding:"2px 7px",borderRadius:6}}>{t}</span>)}
                      </div>}
                    </div>
                  </div>
                </Crd>
              </div>;
            })}
          </div>
        </div>)}
      </div>}

      <div style={{height:30}}/>
    </div>

    {/* Work detail modal */}
    {activeWork&&<div onClick={()=>setActiveWork(null)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",zIndex:80,display:"flex",alignItems:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:T.s1,borderRadius:"24px 24px 0 0",padding:"20px 20px 40px",maxHeight:"85%",overflowY:"auto",scrollbarWidth:"none"}}>
        {/* Handle */}
        <div style={{width:36,height:4,borderRadius:2,background:T.border,margin:"0 auto 16px"}}/>
        {/* Work header */}
        <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:16}}>
          <div style={{width:72,height:72,borderRadius:16,background:activeWork.accent+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Toono size={44} color={activeWork.accent}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"system-ui",fontSize:18,fontWeight:800,color:T.textH,marginBottom:4}}>{activeWork.title}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[activeWork.cat,activeWork.year+"",activeWork.digital?"Дижитал":"Биет"].map(t=><Pill key={t} color={T.accent}>{t}</Pill>)}
              <span style={{fontFamily:"system-ui",fontSize:10,fontWeight:700,color:statusCfg[activeWork.digital?"digital":activeWork.status].color,background:statusCfg[activeWork.digital?"digital":activeWork.status].bg,padding:"4px 10px",borderRadius:20,display:"inline-block"}}>{statusCfg[activeWork.digital?"digital":activeWork.status].label}</span>
            </div>
          </div>
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[[<IcEye/>,activeWork.views.toLocaleString(),"Үзэлт"],[<IcHeart/>,activeWork.likes,"Дурлалт"],[<IcStats/>,activeWork.sales+"ш","Борлуулалт"],[<IcMoney/>,activeWork.price>0?"₮"+(activeWork.price/1000).toFixed(0)+"K":"–","Үнэ"]].map(s=><div key={s[2]} style={{background:T.s2,borderRadius:12,padding:"10px 0",textAlign:"center"}}>
            <div style={{fontSize:16,marginBottom:2}}>{s[0]}</div>
            <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.textH}}>{s[1]}</div>
            <div style={{fontFamily:"system-ui",fontSize:9,color:T.textSub}}>{s[2]}</div>
          </div>)}
        </div>
        {/* Description */}
        <div style={{fontFamily:"system-ui",fontSize:14,color:T.textB,lineHeight:1.7,marginBottom:14}}>{activeWork.desc}</div>
        {/* Details */}
        {[["Материал",activeWork.medium],["Хэмжээ",activeWork.dims]].map(r=><div key={r[0]} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${T.border}`}}>
          <span style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>{r[0]}</span>
          <span style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textH}}>{r[1]}</span>
        </div>)}
        {/* Tags */}
        {activeWork.tags.length>0&&<div style={{marginTop:12,marginBottom:16,display:"flex",gap:6,flexWrap:"wrap"}}>
          {activeWork.tags.map(t=><Pill key={t}>{t}</Pill>)}
        </div>}
        {/* Actions */}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <PBtn full secondary onClick={()=>{setActiveWork(null);nav("upload");}}><span style={{display:"flex",marginRight:4}}><IcEdit/></span>Засах</PBtn>
          {activeWork.status==="draft"&&<PBtn full onClick={()=>{toast("Нийтлэгдлээ","success");setActiveWork(null);}}>Нийтлэх</PBtn>}
          {activeWork.status==="published"&&<PBtn full onClick={()=>{const wid=activeWork.id;setActiveWork(null);nav("work",{workId:wid});}}>Дэлгэрэнгүй</PBtn>}
        </div>
      </div>
    </div>}
  </div>;
}


const root=ReactDOM.createRoot(document.getElementById("root"));root.render(React.createElement(App));
</script></body></html>
