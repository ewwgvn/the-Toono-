        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{flexShrink:0,padding:"7px 16px",borderRadius:20,cursor:"pointer",fontFamily:"system-ui",fontSize:13,fontWeight:500,background:cat===c?T.accent:T.s1,border:`1px solid ${cat===c?T.accent:T.border}`,color:cat===c?"#fff":T.textSub,transition:"all .12s"}}>{c==="all"?"Бүгд":c}</button>)}
      </div>

      {/* Editor pick */}
      {filtered[0]&&<div style={{padding:"0 20px 4px"}}>
        <Crd onClick={()=>nav("work",{workId:filtered[0].id})} style={{marginBottom:16,overflow:"hidden"}}>
          <div style={{height:180,background:filtered[0].images?.[0]?T.s2:`linear-gradient(145deg,${filtered[0].accent}28 0%,${filtered[0].accent}08 100%)`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
            {filtered[0].images?.[0]
              ?<img src={filtered[0].images[0]} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<div style={{opacity:.22}}><Toono size={160} color={filtered[0].accent}/></div>}
            {filtered[0].badge&&<span style={{position:"absolute",top:12,left:14,fontFamily:"system-ui",fontSize:10,fontWeight:700,color:"#fff",background:filtered[0].accent,padding:"4px 10px",borderRadius:8}}>{filtered[0].badge}</span>}
            <div style={{position:"absolute",bottom:12,right:12,display:"flex",gap:6}}>
              <button onClick={e=>{e.stopPropagation();tLike(filtered[0].id);}} style={{width:32,height:32,borderRadius:"50%",background:"rgba(0,0,0,0.4)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:GS.liked.has(filtered[0].id)?T.red:"rgba(255,255,255,0.7)"}}><IcHeart filled={GS.liked.has(filtered[0].id)}/></button>
              <button onClick={e=>{e.stopPropagation();tSave(filtered[0].id);}} style={{width:32,height:32,borderRadius:"50%",background:"rgba(0,0,0,0.4)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:GS.saved.has(filtered[0].id)?T.accent:"rgba(255,255,255,0.7)"}}><IcBookmark filled={GS.saved.has(filtered[0].id)}/></button>
            </div>
          </div>
          <div style={{padding:"14px 16px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:2}}>{filtered[0].title}</div>
              <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>{filtered[0].creator}</div>
            </div>
            <div style={{fontFamily:"system-ui",fontSize:17,fontWeight:700,color:T.accent}}>{fmtP(filtered[0])}</div>
          </div>
        </Crd>
      </div>}

      {/* Recently Viewed */}
      {GS.recentlyViewed.length>0&&<div style={{padding:"0 20px",marginBottom:16}}>
        <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:10}}>Саяхан үзсэн</div>
        <div style={{display:"flex",gap:10,overflowX:"auto",scrollbarWidth:"none"}}>
          {GS.recentlyViewed.slice(0,6).map(id=>{const w=getAllWorks().find(x=>x.id===id);if(!w)return null;return <div key={id} onClick={()=>nav("work",{workId:w.id})} style={{flexShrink:0,width:100,cursor:"pointer"}}>
            <div style={{height:72,borderRadius:12,background:w.images?.[0]?T.s2:w.accent+"18",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",marginBottom:6}}>
              {w.images?.[0]?<img src={w.images[0]} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<Toono size={32} color={w.accent}/>}
            </div>
            <div style={{fontFamily:"system-ui",fontSize:11,fontWeight:600,color:T.textH,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.title}</div>
            <div style={{fontFamily:"system-ui",fontSize:11,color:T.accent,fontWeight:700}}>{fmtP(w)}</div>
          </div>;})}
        </div>
      </div>}

      {/* ── Active Orders Section ── */}
      {GS.orders.length>0&&<div style={{padding:"0 20px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH}}>Миний захиалга</div>
          <button onClick={()=>nav("order-list")} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:13,color:T.accent,cursor:"pointer"}}>Бүгд ({GS.orders.length}) →</button>
        </div>
        <div style={{display:"flex",gap:10,overflowX:"auto",scrollbarWidth:"none",paddingBottom:4}}>
          {GS.orders.slice(0,5).map(o=>{
            const statusMap={"pending":"Хүлээгдэж","making":"Хийж байна","shipped":"Хүргэгдэж","delivered":"Ирсэн","done":"Дууссан","confirmed":"Баталсан"};
            const statusColor={"pending":T.yellow,"making":T.accent,"shipped":T.accent,"delivered":T.green,"done":T.textSub,"confirmed":T.accent};
            const statusIcon={"pending":"⏳","making":"🔨","shipped":"🚚","delivered":"📦","done":"✓","confirmed":"✓"};
            const stepIdx={"pending":0,"confirmed":1,"making":1,"shipped":2,"delivered":3,"done":4}[o.status]||0;
            return <div key={o.id} onClick={()=>{GS.selectedOrderId=o.id;nav("order-detail");}} style={{flexShrink:0,width:220,cursor:"pointer"}}>
              <Crd style={{padding:"14px 16px"}}>
                {/* Status badge */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontFamily:"system-ui",fontSize:11,fontWeight:700,color:statusColor[o.status]||T.textSub,background:(statusColor[o.status]||T.textSub)+"18",padding:"3px 10px",borderRadius:8,display:"flex",alignItems:"center",gap:4}}>
                    <span>{statusIcon[o.status]||"•"}</span>{statusMap[o.status]||o.status}
                  </span>
                  <span style={{fontFamily:"system-ui",fontSize:10,color:T.textSub}}>{o.date}</span>
                </div>
                {/* Title */}
                <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:700,color:T.textH,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.title}</div>
                <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginBottom:10}}>{o.creator}</div>
                {/* Progress bar */}
                <div style={{display:"flex",gap:2,marginBottom:8}}>
                  {[0,1,2,3,4].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=stepIdx?T.accent:T.border,transition:"all .3s"}}/>)}
                </div>
                {/* Price + action */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:800,color:T.accent}}>₮{(o.price||0).toLocaleString()}</div>
                  {o.tracking&&<span style={{fontFamily:"system-ui",fontSize:9,color:T.green,background:T.greenSub,padding:"2px 7px",borderRadius:6}}>🚚 Хянах</span>}
                </div>
              </Crd>
            </div>;
          })}
        </div>
      </div>}

      {/* ── Order proposal — minimal ── */}
      <div style={{padding:"0 20px",marginBottom:20}}>
        <div onClick={()=>nav("explore")} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",background:T.s1,border:`1px solid ${T.border}`,borderRadius:16,cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.accent+"60"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
          <div style={{width:42,height:42,borderRadius:12,background:T.accentSub,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:T.accent}}><IcCommission/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH}}>Бүтээлчид захиалга илгээх</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>Дуртай бүтээлчээ олж, хүссэн зүйлээ захиалаарай</div>
          </div>
          <span style={{color:T.accent,flexShrink:0,opacity:.6}}><IcChevron/></span>
        </div>
        {/* Quick access row */}
        {(GS.orders.length>0||GS.cart.length>0)&&<div style={{display:"flex",gap:8,marginTop:8}}>
          {GS.cart.length>0&&<button onClick={()=>nav("cart")} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px",background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.textSub}}>
            <IcCart/> Сагс <span style={{minWidth:16,height:16,borderRadius:8,background:T.red,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff"}}>{GS.cart.length}</span>
          </button>}
          {GS.orders.length>0&&<button onClick={()=>nav("order-list")} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px",background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.textSub}}>
            <IcOrder/> Захиалга <span style={{minWidth:16,height:16,borderRadius:8,background:T.accent,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff"}}>{GS.orders.length}</span>
          </button>}
        </div>}
      </div>

      {/* Grid */}
      {filtered.length>0?<div className="toono-grid-2" style={{padding:"0 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        {filtered.slice(1,5).map(w=><WorkCard key={w.id} work={w} onClick={()=>nav("work",{workId:w.id})} onToggleLike={tLike} onToggleSave={tSave}/>)}
      </div>
      :<div style={{padding:"40px 20px",textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:22,background:T.accentSub,border:`1px solid ${T.accentGlow}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Toono size={40} color={T.accent}/></div>
        <div style={{fontFamily:"system-ui",fontSize:17,fontWeight:700,color:T.textH,marginBottom:8}}>{GS.currentRole==="creator"?"Бүтээлээ байршуулаарай":"Бүтээлч нарыг олж нээрэй"}</div>
        <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginBottom:20,lineHeight:1.6}}>{GS.currentRole==="creator"?"Эхний бүтээлээ байршуулж, The TOONO-д таниулаарай":"Монгол бүтээлчдийн бүтээлийг нээн илрүүлээрэй"}</div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {GS.currentRole==="creator"&&<PBtn onClick={()=>nav("upload")}>Бүтээл байршуулах</PBtn>}
          <PBtn secondary onClick={()=>nav("explore")}>Бүтээлч хайх</PBtn>
        </div>
      </div>}

      {/* Creators row */}
      <div style={{padding:"0 20px 8px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontFamily:"system-ui",fontSize:17,fontWeight:700,color:T.textH}}>Бүтээлчид</div>
          <button onClick={()=>nav("explore")} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:13,color:T.accent,cursor:"pointer"}}>Бүгдийг харах</button>
        </div>
        <div style={{display:"flex",gap:14,overflowX:"auto",scrollbarWidth:"none",paddingBottom:4}}>
          {getCreators().slice(0,5).map(c=><div key={c.id} onClick={()=>nav("profile",{creatorId:c.id})} style={{flexShrink:0,textAlign:"center",cursor:"pointer",width:76}}>
            <div style={{width:56,height:56,borderRadius:18,background:c.accent+"20",border:`1.5px solid ${c.accent}35`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 8px"}}>
              <Toono size={32} color={c.accent}/>
            </div>
            <div style={{fontFamily:"system-ui",fontSize:11,fontWeight:600,color:T.textH,marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name.split(" ")[0]}</div>
            <div style={{fontFamily:"system-ui",fontSize:10,color:T.textSub}}>{c.field.split(" · ")[0]}</div>
          </div>)}
        </div>
      </div>

      <div style={{height:90}}/>
    </div>
  </div>;
}

// ── EXPLORE ──
function Explore({nav, refresh}) {
  const [q,setQ]=useState("");
  const [debouncedQ,setDebouncedQ]=useState("");
  const debounceRef=React.useRef(null);
  const handleSearch=(val)=>{setQ(val);setVisibleCount(12);clearTimeout(debounceRef.current);debounceRef.current=setTimeout(()=>setDebouncedQ(val),300);};
  const [matFilter,setMatFilter]=useState("Бүгд");
  const [recentSearches]=useState(["Загвар","Нэхмэл","Тэмээний ноос","Тотем"]);
  const [visibleCount,setVisibleCount]=useState(12);
  const [tab,setTab]=useState("creators");
  const [cat,setCat]=useState("all");
  const [sort,setSort]=useState("popular");
  const [filterOpen,setFilterOpen]=useState(false);
  const [commOnly,setCommOnly]=useState(false);
  const [price,setPrice]=useState("all");
  const cats=["all","Загвар","Нэхмэл","Урлаг","Орон зай","График"];
  const af=(cat!=="all"?1:0)+(price!=="all"?1:0)+(commOnly?1:0);
  const fc=getCreators().filter(c=>{
    if(debouncedQ&&!c.name.toLowerCase().includes(debouncedQ.toLowerCase())&&!c.field.includes(debouncedQ))return false;
    if(cat!=="all"&&!c.field.includes(cat))return false;
    if(commOnly&&!c.comm)return false;
    return true;
  });
  const fw=getAllWorks().filter(w=>{
    if(debouncedQ&&!w.title.toLowerCase().includes(debouncedQ.toLowerCase())&&!w.creator.toLowerCase().includes(debouncedQ.toLowerCase()))return false;
    if(matFilter!=="Бүгд"&&w.material!==matFilter)return false;
    if(cat!=="all"&&w.cat!==cat)return false;
    if(price==="under100"&&w.price>=100000)return false;
    if(price==="100to300"&&(w.price<100000||w.price>300000))return false;
    if(price==="over300"&&w.price<300000)return false;
    return true;
  });
  const tFollow=id=>{GS.following.has(id)?GS.following.delete(id):GS.following.add(id);refresh();};
  const tLike=id=>{GS.liked.has(id)?GS.liked.delete(id):GS.liked.add(id);refresh();};
  const tSave=id=>{GS.saved.has(id)?GS.saved.delete(id):GS.saved.add(id);refresh();};

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,position:"relative"}}>
    <div style={{padding:"20px 20px 12px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontFamily:"system-ui",fontSize:24,fontWeight:800,color:T.textH}}>Хайлт</div>
        <button onClick={()=>setFilterOpen(true)} style={{position:"relative",width:42,height:42,borderRadius:12,background:af>0?T.accent:T.s1,border:`1px solid ${af>0?T.accent:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:af>0?"#fff":T.textSub}}>
          <IcFilter/>
          {af>0&&<div style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:T.red,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:"system-ui",fontSize:9,fontWeight:700,color:"#fff"}}>{af}</span></div>}
        </button>
      </div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{color:T.textSub,display:"flex"}}><IcSearch/></span>
        <input value={q} onChange={e=>handleSearch(e.target.value)} placeholder="Хайлт..." style={{background:"none",border:"none",outline:"none",fontFamily:"system-ui",fontSize:14,color:T.textH,flex:1}}/>
        {q&&<button onClick={()=>{setQ("");setDebouncedQ("");}} style={{background:"none",border:"none",color:T.textSub,cursor:"pointer",display:"flex"}}><IcX/></button>}
      </div>
    </div>
    <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
      {[["creators","Бүтээлч "+fc.length],["works","Бүтээл "+fw.length]].map(t=><button key={t[0]} onClick={()=>setTab(t[0])} style={{flex:1,padding:"11px 0",background:"none",border:"none",fontFamily:"system-ui",fontSize:14,fontWeight:tab===t[0]?700:500,color:tab===t[0]?T.accent:T.textSub,borderBottom:`2px solid ${tab===t[0]?T.accent:"transparent"}`,cursor:"pointer"}}>{t[1]}</button>)}
    </div>
    <div style={{padding:"10px 20px 0",display:"flex",gap:8,overflowX:"auto",scrollbarWidth:"none",flexShrink:0}}>
      {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{flexShrink:0,padding:"6px 14px",borderRadius:20,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,background:cat===c?T.accent:T.s1,border:`1px solid ${cat===c?T.accent:T.border}`,color:cat===c?"#fff":T.textSub}}>{c==="all"?"Бүгд":c}</button>)}
    </div>
    {/* Material filter — Creema-style */}
    {tab==="works"&&<div style={{padding:"4px 20px 0",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",flexShrink:0}}>
      {MATERIALS.map(m=><button key={m} onClick={()=>setMatFilter(m)} style={{flexShrink:0,padding:"4px 10px",borderRadius:8,cursor:"pointer",fontFamily:"system-ui",fontSize:10,fontWeight:600,background:matFilter===m?T.greenSub:T.s2,border:`1px solid ${matFilter===m?T.green+"60":T.border}`,color:matFilter===m?T.green:T.textSub}}>{m}</button>)}
    </div>}
    <div style={{padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
      <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{(tab==="creators"?fc.length:fw.length)} үр дүн</div>
      <div style={{display:"flex",gap:5}}>
        {[["popular","Алдартай"],["new","Шинэ"],["works","Бүтээл"]].map(s=><button key={s[0]} onClick={()=>setSort(s[0])} style={{padding:"4px 9px",borderRadius:8,cursor:"pointer",fontFamily:"system-ui",fontSize:11,fontWeight:600,background:sort===s[0]?T.accentSub:T.s1,border:`1px solid ${sort===s[0]?T.accent:T.border}`,color:sort===s[0]?T.accent:T.textSub}}>{s[1]}</button>)}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"0 20px"}}>
      {tab==="creators"&&(fc.length===0
        ?<Empty icon={<IcSearchEmpty/>} title="Бүтээлч олдсонгүй"/>
        :fc.map(c=><CreatorRow key={c.id} creator={c} onClick={()=>nav("profile",{creatorId:c.id})} onFollow={tFollow} showFollow/>))}
      {tab==="works"&&(fw.length===0
        ?<Empty icon={<IcSearchEmpty/>} title="Бүтээл олдсонгүй"/>
        :<div>
          <div className="toono-grid-2" style={{paddingTop:8,paddingBottom:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {fw.slice(0,visibleCount).map(w=><WorkCard key={w.id} work={w} onClick={()=>nav("work",{workId:w.id})} onToggleLike={tLike} onToggleSave={tSave}/>)}
          </div>
          {fw.length>visibleCount&&<div style={{textAlign:"center",padding:"16px 0"}}>
            <button onClick={()=>setVisibleCount(v=>v+12)} style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 32px",fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.accent,cursor:"pointer"}}>Дараагийнхыг харах ({fw.length-visibleCount} үлдсэн)</button>
          </div>}
        </div>)}
      <div style={{height:20}}/>
    </div>
    {filterOpen&&<div onClick={()=>setFilterOpen(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",zIndex:90}}>
      <div onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,background:T.s1,borderRadius:"22px 22px 0 0",padding:"20px 20px 36px"}}>
        <div style={{width:36,height:4,borderRadius:2,background:T.border,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"system-ui",fontSize:17,fontWeight:700,color:T.textH}}>Шүүлт</div>
          <button onClick={()=>{setCat("all");setPrice("all");setCommOnly(false);}} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.accent,cursor:"pointer"}}>Цэвэрлэх</button>
        </div>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:10}}>Захиалга</div>
        <button onClick={()=>setCommOnly(!commOnly)} style={{display:"flex",alignItems:"center",gap:12,background:"none",border:"none",cursor:"pointer",marginBottom:20}}>
          <div style={{width:44,height:26,borderRadius:13,background:commOnly?T.accent:T.border,position:"relative",transition:"background .2s"}}>
            <div style={{position:"absolute",top:3,left:commOnly?21:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
          </div>
          <span style={{fontFamily:"system-ui",fontSize:14,color:T.textH}}>Захиалга авах Бүтээлч</span>
        </button>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:10}}>Үнийн хэмжээ</div>
        <div style={{display:"flex",gap:8,marginBottom:24}}>
          {[["all","Бүгд"],["under100","~₮100K"],["100to300","₮100~300K"],["over300","₮300K~"]].map(pp=><button key={pp[0]} onClick={()=>setPrice(pp[0])} style={{flex:1,padding:"9px 4px",borderRadius:10,cursor:"pointer",fontFamily:"system-ui",fontSize:11,fontWeight:600,background:price===pp[0]?T.accent:T.s2,border:`1px solid ${price===pp[0]?T.accent:T.border}`,color:price===pp[0]?"#fff":T.textSub}}>{pp[1]}</button>)}
        </div>
        <PBtn full onClick={()=>setFilterOpen(false)}>Хэрэглэх</PBtn>
      </div>
    </div>}
  </div>;
}


// ── SIMPLE WRAPPER ──
function Simple({children, nav, title, back="home", right, goBack}) {
  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <button onClick={()=>goBack?goBack():nav(back)} style={{width:36,height:36,borderRadius:10,background:T.s1,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.textH,flexShrink:0}}><IcBack/></button>
      <div style={{fontFamily:"system-ui",fontSize:20,fontWeight:800,color:T.textH}}>{title}</div>
      {right&&<div style={{marginLeft:"auto"}}>{right}</div>}
    </div>
    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"0 20px"}}>
      {children}
      <div style={{height:30}}/>
    </div>
  </div>;
}

// ── WORK DETAIL ──
function WorkDetail({nav, refresh, workId}) {
  const w=getAllWorks().find(x=>x.id===workId)||GS.myWorks[0]||{id:0,title:"—",creator:"—",price:0,accent:"#5B8FE8",likes:0,desc:"",sizes:[],colors:[],stock:0};
  const [offerOpen,setOfferOpen]=useState(false);
  const [zoomOpen,setZoomOpen]=useState(false);
  const [touchStart,setTouchStart]=useState(null);
  const [offerPrice,setOfferPrice]=useState("");
  const [offerMsg,setOfferMsg]=useState("");
  // Track recently viewed
  React.useEffect(()=>{
    if(w?.id && !GS.recentlyViewed.includes(w.id)){
      GS.recentlyViewed = [w.id, ...GS.recentlyViewed.filter(id=>id!==w.id)].slice(0,20);
      saveGS();
    }
  },[w?.id]);
  const [selSize,setSelSize]=useState(w.sizes?.[0]||null);
  const [selColor,setSelColor]=useState(w.colors?.[0]||null);
  const [qty,setQty]=useState(1);
  const [liked,setLiked]=useState(GS.liked.has(w.id));
  const [saved,setSaved]=useState(GS.saved.has(w.id));
  const [imgIdx,setImgIdx]=useState(0);
  const tLike=()=>{const v=!liked;if(v)GS.liked.add(w.id);else GS.liked.delete(w.id);setLiked(v);refresh();};
  const tSave=()=>{const v=!saved;if(v)GS.saved.add(w.id);else GS.saved.delete(w.id);setSaved(v);refresh();};

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>goBack?goBack():nav("home")} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><IcBack/><span style={{fontFamily:"system-ui",fontSize:16,fontWeight:600}}>Буцах</span></button>
      <div style={{display:"flex",gap:12,color:T.textSub}}>
        <button onClick={tLike} style={{background:"none",border:"none",cursor:"pointer",color:liked?T.red:T.textSub,display:"flex"}}><IcHeart filled={liked}/></button>
        <button onClick={tSave} style={{background:"none",border:"none",cursor:"pointer",color:saved?T.accent:T.textSub,display:"flex"}}><IcBookmark filled={saved}/></button>
        <button onClick={()=>toast("Холбоос хуулагдлаа","success")} style={{background:"none",border:"none",cursor:"pointer",color:T.textSub,display:"flex"}}><IcShare/></button>
        <button onClick={()=>nav("report")} style={{background:"none",border:"none",cursor:"pointer",fontSize:16}}><IcReport/></button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none"}}>
      {/* Fullscreen zoom modal */}
      {zoomOpen&&<div onClick={()=>setZoomOpen(false)} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.95)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
        <button onClick={()=>setZoomOpen(false)} style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",zIndex:1001}}><IcX/></button>
        <img src={w.images[imgIdx||0]} alt="" style={{maxWidth:"95vw",maxHeight:"85vh",objectFit:"contain",borderRadius:8}}
          onTouchStart={e=>setTouchStart(e.touches[0].clientX)}
          onTouchEnd={e=>{if(!touchStart)return;const diff=e.changedTouches[0].clientX-touchStart;if(Math.abs(diff)>50){if(diff<0&&imgIdx<w.images.length-1)setImgIdx(imgIdx+1);if(diff>0&&imgIdx>0)setImgIdx(imgIdx-1);}setTouchStart(null);}}
        />
        {w.images.length>1&&<div style={{display:"flex",gap:8,marginTop:16}}>
          {w.images.map((_,i)=><button key={i} onClick={e=>{e.stopPropagation();setImgIdx(i);}} style={{width:i===(imgIdx||0)?24:10,height:10,borderRadius:5,background:i===(imgIdx||0)?"#fff":"rgba(255,255,255,0.3)",border:"none",cursor:"pointer",transition:"all .2s"}}/>)}
        </div>}
        <div style={{fontFamily:"system-ui",fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:10}}>{(imgIdx||0)+1} / {w.images.length} · Зүүн баруун шудрах</div>
      </div>}
      {/* Hero image / gallery */}
      {w.images?.length>0
        ?<div style={{margin:"0 20px",borderRadius:20,overflow:"hidden",position:"relative",cursor:"zoom-in"}} onClick={()=>setZoomOpen(true)}
          onTouchStart={e=>setTouchStart(e.touches[0].clientX)}
          onTouchEnd={e=>{if(!touchStart)return;const diff=e.changedTouches[0].clientX-touchStart;if(Math.abs(diff)>50){e.stopPropagation();if(diff<0&&imgIdx<w.images.length-1)setImgIdx(imgIdx+1);if(diff>0&&imgIdx>0)setImgIdx(imgIdx-1);setZoomOpen(false);}setTouchStart(null);}}>
          <img src={w.images[imgIdx||0]} alt="" loading="lazy" style={{width:"100%",height:260,objectFit:"cover",display:"block",transition:"transform .3s"}}/>
          {w.images.length>1&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",display:"flex",gap:6}}>
            {w.images.map((_,i)=><button key={i} onClick={e=>{e.stopPropagation();setImgIdx(i);}} style={{width:i===(imgIdx||0)?20:8,height:8,borderRadius:4,background:i===(imgIdx||0)?"#fff":"rgba(255,255,255,0.4)",border:"none",cursor:"pointer",transition:"all .2s"}}/>)}
          </div>}
          {w.badge&&<span style={{position:"absolute",top:14,left:14,fontFamily:"system-ui",fontSize:12,fontWeight:700,color:"#fff",background:"rgba(91,143,232,0.85)",padding:"5px 12px",borderRadius:10}}>{w.badge}</span>}
          {/* Swipe hint + count */}
          <div style={{position:"absolute",bottom:14,right:14,background:"rgba(0,0,0,0.5)",borderRadius:10,padding:"6px 12px",display:"flex",alignItems:"center",gap:6}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,0.6)" strokeWidth="1"/><path d="M5 7H9M7 5V9" stroke="rgba(255,255,255,0.6)" strokeWidth="1" strokeLinecap="round"/></svg>
            <span style={{fontFamily:"system-ui",fontSize:12,color:T.textB}}>{(imgIdx||0)+1}/{w.images.length}</span>
          </div>
        </div>
        :<div style={{height:260,background:`linear-gradient(135deg,#1A2A5A,${w.accent},#1A2A5A)`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",margin:"0 20px",borderRadius:20}}>
          <div style={{opacity:.25}}><Toono size={200} color="#fff"/></div>
          {w.badge&&<span style={{position:"absolute",top:14,left:14,fontFamily:"system-ui",fontSize:12,fontWeight:700,color:"#fff",background:"rgba(91,143,232,0.85)",padding:"5px 12px",borderRadius:10}}>{w.badge}</span>}
          <div style={{position:"absolute",bottom:14,right:14,background:"rgba(0,0,0,0.5)",borderRadius:10,padding:"6px 12px"}}>
            <span style={{fontFamily:"system-ui",fontSize:12,color:T.textB}}><IcHeart/> {(w.likes||0).toLocaleString()}</span>
          </div>
        </div>}
      {/* Video if available */}
      {w.video&&<div style={{margin:"10px 20px 0",borderRadius:14,overflow:"hidden"}}>
        <video src={w.video} controls style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block",background:T.s2}}/>
      </div>}
      <div style={{padding:"18px 20px 0"}}>
        <SocialProof work={w}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{fontFamily:"system-ui",fontSize:22,fontWeight:800,color:T.textH,flex:1,lineHeight:1.2}}>{w.title}</div>
          <div style={{fontFamily:"system-ui",fontSize:22,fontWeight:800,color:T.accent,marginLeft:12,flexShrink:0}}>{fmtP(w)}</div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {[w.cat,"Монгол","Гараар хийсэн"].map(t=><Pill key={t}>{t}</Pill>)}
        </div>
        <Crd onClick={()=>nav("profile",{creatorId:w.cid})} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <Avt size={44} color={w.accent||T.accent}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH}}>{w.creator||GS.user.name}</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{w.cat||"Бүтээлч"}</div>
          </div>
          <span style={{color:T.textSub}}><IcChevron/></span>
        </Crd>
        <div style={{height:1,background:T.border}}/>
        <div style={{padding:"16px 0"}}>
          <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:10}}>Бүтээлийн тайлбар</div>
          <div style={{fontFamily:"system-ui",fontSize:14,color:T.textB,lineHeight:1.8}}>{w.desc}</div>
        </div>
        <div style={{height:1,background:T.border}}/>
        <div style={{padding:"16px 0"}}>
          <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:12}}>Барааны мэдээлэл</div>
          {[["Материал","Тэмээний ноос 60% · Хонины ноос 40%"],["Хэмжээ","S / M / L / XL"],["Хийх хугацаа","Захиалгын дараа 3~4 долоо хоног"],["Дугаарлалт","10 ширхэг хязгаарлагдмал"],["Хүргэлт","Дотоод · Гадаад боломжтой"]].map(r=><div key={r[0]} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${T.border}`}}>
            <span style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>{r[0]}</span>
            <span style={{fontFamily:"system-ui",fontSize:13,fontWeight:500,color:T.textH}}>{r[1]}</span>
          </div>)}
        </div>
        <div style={{marginTop:4}}>
          <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:12}}>Мөн бүтээлчийн Бүтээл</div>
          <div style={{display:"flex",gap:10,overflowX:"auto",scrollbarWidth:"none"}}>
            {getAllWorks().filter(ww=>ww.id!==w.id).slice(0,3).map(ww=><div key={ww.id} onClick={()=>nav("work",{workId:ww.id})} style={{flexShrink:0,width:120,cursor:"pointer"}}>
              <div style={{height:80,borderRadius:12,background:ww.accent+"18",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6,overflow:"hidden"}}>
                {ww.images?.[0] ? <img src={ww.images[0]} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <Toono size={44} color={ww.accent}/>}
              </div>
              <div style={{fontFamily:"system-ui",fontSize:11,fontWeight:600,color:T.textH,marginBottom:2}}>{ww.title}</div>
              <div style={{fontFamily:"system-ui",fontSize:11,color:T.accent,fontWeight:700}}>{fmtP(ww)}</div>
            </div>)}
          </div>
        </div>
        <div style={{height:20}}/>
      </div>
    </div>
    {/* Offer Bottom Sheet */}
    <BottomSheet open={offerOpen} onClose={()=>setOfferOpen(false)} title="Үнийн санал илгээх" height="50%">
      <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginBottom:14}}>Бүтээлчид хүссэн үнэ санал болгоно. Хариуг хүлээнэ үү.</div>
      <div style={{fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.textSub,marginBottom:6}}>Анхны үнэ: {fmtP(w)}</div>
      <input type="number" value={offerPrice} onChange={e=>setOfferPrice(e.target.value)} placeholder="Санал болгох үнэ (₮)" style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,borderRadius:13,padding:"14px 16px",fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
      <textarea value={offerMsg} onChange={e=>setOfferMsg(e.target.value)} placeholder="Зурвас (заавал биш)" rows={3} style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,borderRadius:13,padding:"12px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",resize:"none",marginBottom:16,boxSizing:"border-box"}}/>
      <PBtn full disabled={!offerPrice} onClick={()=>{
        GS.offers.push({id:Date.now(),workId:w.id,workTitle:w.title,price:Number(offerPrice),msg:offerMsg,status:"pending",date:new Date().toLocaleDateString()});
        GS.notifications.unshift({id:Date.now(),icon:"comm",title:"Үнийн санал илгээлээ",desc:`${w.title} — ₮${Number(offerPrice).toLocaleString()}`,time:"Сая",read:true,to:"me"});
        setOfferOpen(false);setOfferPrice("");setOfferMsg("");
        refresh();toast("Үнийн санал илгээлээ","success");
      }}>Санал илгээх</PBtn>
    </BottomSheet>
    {/* Size / Color / Qty Selectors */}
    <div style={{padding:"0 20px 0",background:T.bg}}>
      {w.sizes?.length>0&&<div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        <span style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,width:"100%",marginBottom:2}}>Хэмжээ</span>
        {w.sizes.map(s=><button key={s} onClick={()=>setSelSize(s)} style={{padding:"6px 14px",borderRadius:10,cursor:"pointer",fontFamily:"system-ui",fontSize:12,fontWeight:600,background:selSize===s?T.accent:T.s1,border:`1px solid ${selSize===s?T.accent:T.border}`,color:selSize===s?"#fff":T.textSub}}>{s}</button>)}
      </div>}
      {w.colors?.length>0&&<div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
        <span style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>Өнгө</span>
        {w.colors.map(cl=><button key={cl} onClick={()=>setSelColor(cl)} style={{width:28,height:28,borderRadius:14,background:cl,border:selColor===cl?`3px solid ${T.accent}`:`2px solid ${T.border}`,cursor:"pointer"}}/>)}
      </div>}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>Тоо</span>
        <button onClick={()=>setQty(Math.max(1,qty-1))} style={{width:30,height:30,borderRadius:8,background:T.s1,border:`1px solid ${T.border}`,color:T.textH,cursor:"pointer",fontWeight:700}}>−</button>
        <span style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,minWidth:24,textAlign:"center"}}>{qty}</span>
        <button onClick={()=>setQty(Math.min(w.stock||99,qty+1))} style={{width:30,height:30,borderRadius:8,background:T.s1,border:`1px solid ${T.border}`,color:T.textH,cursor:"pointer",fontWeight:700}}>+</button>
        {w.stock&&<span style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginLeft:6}}>Үлдэгдэл {w.stock}ш</span>}
      </div>
    </div>
    <div style={{padding:"12px 20px 32px",background:T.bg,borderTop:`1px solid ${T.border}`,display:"flex",gap:8,alignItems:"center"}}>
      <button onClick={()=>{
        let convo = GS.conversations.find(cv=>cv.name===(w.creator||GS.user.name));
        if(!convo){convo={id:Date.now(),name:w.creator||"Бүтээлч",accent:w.accent||T.accent,online:false,unread:0,msgs:[]};GS.conversations.unshift(convo);}
        GS.activeChatId=convo.id;refresh();nav("chatroom");
      }} style={{width:44,height:44,background:T.accentSub,border:`1px solid ${T.accentGlow}`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:T.accent}}><IcMsg/></button>
      {w.price>0&&<button onClick={()=>setOfferOpen(true)} style={{width:44,height:44,background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:T.yellow,fontFamily:"system-ui",fontSize:11,fontWeight:700}}>₮?</button>}
      {w.price>0&&(w.stock===undefined||w.stock>0)
        ?<><button onClick={()=>{
          const cartItem={...w,size:selSize,color:selColor,qty};
          if(!GS.cart.find(c=>c.id===w.id)){GS.cart.push(cartItem);}
          toast("Сагсанд нэмэгдлээ","success");refresh();
        }} style={{flex:1,background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:14,fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.textH,cursor:"pointer"}}><span style={{display:"flex",marginRight:4}}><IcCart/></span>Сагс</button>
           <button onClick={()=>{
             GS.directBuyItem={...w,size:selSize,color:selColor,qty};
             nav("checkout");
           }} style={{flex:2,background:T.accent,border:"none",borderRadius:14,padding:14,fontFamily:"system-ui",fontSize:15,fontWeight:700,color:"#fff",cursor:"pointer"}}>Шууд авах — {fmtP(w)}</button></>
        :w.price>0
          ?<button onClick={()=>toast("Нөөц ирэхэд мэдэгдэл илгээнэ","success")} style={{flex:1,background:T.s2,border:`1px solid ${T.border}`,borderRadius:14,padding:14,fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,cursor:"pointer"}}><span style={{display:"flex",marginRight:4}}><IcBell/></span>Нөөц ирэхэд мэдэгдэх</button>
          :<button onClick={()=>nav("commission")} style={{flex:1,background:T.accentSub,border:`1px solid ${T.accentGlow}`,borderRadius:14,padding:14,fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.accent,cursor:"pointer"}}>Захиалга өгөх</button>}
    </div>
  </div>;
}

// ── CREATOR PROFILE ──
function CreatorProfile({nav, refresh, creatorId}) {
  const creator = getCreators().find(x=>x.id===creatorId)||getCreators()[0]||{id:1,name:GS.user.name,field:GS.user.field||"Бүтээлч",followers:GS.user.followers||"0",works:GS.myWorks.length,comm:GS.user.commOpen,rating:0,accent:"#5B8FE8"};
  const [tab,setTab]=useState("works");
  const c=creator;
  const following=GS.following.has(c.id);
  const tFollow=()=>{following?GS.following.delete(c.id):GS.following.add(c.id);saveGS();refresh();};

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>goBack?goBack():nav("home")} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><IcBack/><span style={{fontFamily:"system-ui",fontSize:16,fontWeight:600}}>Буцах</span></button>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>toast("Профайлын холбоос хуулагдлаа","success")} style={{background:"none",border:"none",cursor:"pointer",color:T.textSub,display:"flex"}}><IcShare/></button>
        <button style={{background:"none",border:"none",cursor:"pointer",color:T.textSub,display:"flex"}}><IcDots/></button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none"}}>
      <div style={{height:110,background:`linear-gradient(135deg,${c.accent}28,${c.accent}08)`,margin:"14px 20px 0",borderRadius:20,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,opacity:.08,display:"flex",alignItems:"center",justifyContent:"center"}}><Toono size={160} color={c.accent}/></div>
        <div style={{position:"absolute",bottom:-26,left:20,width:52,height:52,borderRadius:16,background:c.accent,display:"flex",alignItems:"center",justifyContent:"center",border:`3px solid ${T.bg}`}}><Toono size={32} color="#fff"/></div>
      </div>
      <div style={{padding:"34px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontFamily:"system-ui",fontSize:22,fontWeight:800,color:T.textH}}>{c.name}</div>
            <div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub,marginTop:3}}>{c.field}</div>
            <TrustBadges creator={c}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{
              // Find or create conversation with this creator
              let convo = GS.conversations.find(cv=>cv.name===c.name);
              if(!convo){
                convo = {id:Date.now(),name:c.name,accent:c.accent||T.accent,online:false,unread:0,msgs:[]};
                GS.conversations.unshift(convo);
              }
              GS.activeChatId=convo.id;refresh();nav("chatroom");
            }} style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 12px",fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,cursor:"pointer"}}><IcMsg/></button>
            <PBtn small secondary={following} onClick={tFollow}>{following?"Дагаж байна":"Дагах"}</PBtn>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <ResponseBadge hours={2}/>
          {c.id===1&&<StarSellerBadge/>}
        </div>
        {c.comm&&<div style={{display:"inline-flex",alignItems:"center",gap:6,background:T.greenSub,border:`1px solid ${T.green}40`,borderRadius:10,padding:"5px 12px",marginBottom:12}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:T.green}}/>

// ── COMMISSION ──
function CommissionScreen({nav, goBack}) {
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({type:"",budget:"",desc:"",date:""});
  const [loading,setLoading]=useState(false);
  const [attachments,setAttachments]=useState([]);
  const steps=["Ажлын төрөл","Төсөв · Хугацаа","Агуулга бичих","Баталгаажуулах"];
  const types=[["Загварын дизайн","Хувцас, загварын хөгжүүлэлт"],["Нэхмэлийн загвар","Даавуу, угалзын дизайн"],["Загварын зөвлөгөө","Концепц, дүр санал"],["График материал","Лого, савлагаа г.м."]];

  const budgets=["₮50,000~100,000","₮100,000~300,000","₮300,000~500,000","₮500,000 дээш тэмдэгт"];
  const next=()=>{
    if(step===0&&!form.type){toast("Захиалгын төрлийг сонгоно уу","error");return;}
    if(step===1&&!form.budget){toast("Төсвийг сонгоно уу","error");return;}
    if(step===2&&form.desc.length<10){toast("Захиалгын тайлбарыг 10-аас дээш тэмдэгтээр бичнэ үү","error");return;}
    if(step<3){setStep(step+1);}
    else{setLoading(true);setTimeout(()=>{
      const newComm = {
        id: Date.now(),
        buyer: GS.user.name,
        type: form.type || "—",
        budget: form.budget || "—",
        date: new Date().toISOString().slice(0,10).replace(/-/g,"."),
        deliveryDate: form.date || "—",
        msg: form.desc,
        status: "pending",
      };
      GS.myCommissions.unshift(newComm);
      GS.notifications.unshift({
        id: Date.now()+1,
        icon: "comm",
        title: "Захиалга илгээгдлээ",
        desc: `${form.type||"Загварын дизайн"} захиалга амжилттай илгээгдлээ.`,
        time: "Сая",
        read: true,
        to: "comm-manage",
      });
      saveGS();setLoading(false);nav("me");toast("Захиалга илгээгдлээ","success");
    },1400);}
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 14px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>step===0?(goBack?goBack():nav("home")):setStep(step-1)} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
        <div style={{fontFamily:"system-ui",fontSize:20,fontWeight:800,color:T.textH}}>Захиалга өгөх</div>
      </div>
      <div style={{display:"flex",gap:5}}>
        {steps.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?T.accent:T.border,transition:"all .3s"}}/>)}
      </div>
      <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginTop:8}}>{step+1}/{steps.length} — {steps[step]}</div>
    </div>
    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"0 20px"}}>
      <Crd style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <Avt size={40} color={T.accent}/>
        <div>
          <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH}}>{GS.user.name}</div>
          <div style={{fontFamily:"system-ui",fontSize:12,color:T.green}}>● Захиалга Авч байна</div>
        </div>
      </Crd>
      {step===0&&<>
        <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:12}}>Захиалгын төрөл</div>
        {types.map(t=><button key={t[0]} onClick={()=>setForm({...form,type:t[0]})} style={{width:"100%",background:form.type===t[0]?T.accentSub:T.s1,border:`1.5px solid ${form.type===t[0]?T.accent:T.border}`,borderRadius:16,padding:"15px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left",marginBottom:10}}>
          <div>
            <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:600,color:T.textH}}>{t[0]}</div>
            <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginTop:3}}>{t[1]}</div>
          </div>
          {form.type===t[0]&&<span style={{color:T.accent}}><IcCheck/></span>}
        </button>)}
      </>}
      {step===1&&<>
        <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:14}}>Төсвийн хэмжээгээ сонгоно уу</div>
        {budgets.map(b=><button key={b} onClick={()=>setForm({...form,budget:b})} style={{width:"100%",background:form.budget===b?T.accentSub:T.s1,border:`1.5px solid ${form.budget===b?T.accent:T.border}`,borderRadius:14,padding:"14px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontFamily:"system-ui",fontSize:14,fontWeight:600,color:T.textH}}>{b}</span>
          {form.budget===b&&<span style={{color:T.accent}}><IcCheck/></span>}
        </button>)}
        <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginTop:20,marginBottom:10}}>Хүссэн дуусгах огноо</div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginBottom:6}}>Жил</div>
            <select value={(form.date||"").split("-")[0]||new Date().getFullYear()} onChange={e=>{const p=(form.date||`${new Date().getFullYear()}-01-01`).split("-");setForm({...form,date:`${e.target.value}-${p[1]||"01"}-${p[2]||"01"}`});}} style={{width:"100%",background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 12px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",appearance:"none",cursor:"pointer"}}>
              {[2025,2026,2027].map(y=><option key={y} value={y} style={{background:T.s1}}>{y}</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginBottom:6}}>Сар</div>
            <select value={parseInt((form.date||"").split("-")[1])||1} onChange={e=>{const p=(form.date||`${new Date().getFullYear()}-01-01`).split("-");setForm({...form,date:`${p[0]}-${String(e.target.value).padStart(2,"0")}-${p[2]||"01"}`});}} style={{width:"100%",background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 12px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",appearance:"none",cursor:"pointer"}}>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m} style={{background:T.s1}}>{m} сар</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginBottom:6}}>Өдөр</div>
            <select value={parseInt((form.date||"").split("-")[2])||1} onChange={e=>{const p=(form.date||`${new Date().getFullYear()}-01-01`).split("-");setForm({...form,date:`${p[0]}-${p[1]||"01"}-${String(e.target.value).padStart(2,"0")}`});}} style={{width:"100%",background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 12px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",appearance:"none",cursor:"pointer"}}>
              {Array.from({length:31},(_,i)=>i+1).map(d=><option key={d} value={d} style={{background:T.s1}}>{d}</option>)}
            </select>
          </div>
        </div>
      </>}
      {step===2&&<>
        <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:14}}>Захиалгын тайлбар бичнэ үү</div>
        <textarea value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Хүссэн загвар, зориулалт, онцгой хүсэлтийг дэлгэрэнгүй бичнэ үү. (хамгийн багадаа 10 тэмдэгт)" style={{width:"100%",minHeight:150,background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:16,fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",resize:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
        <div style={{textAlign:"right",fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:4,marginBottom:12}}>{form.desc.length} тэмдэгт</div>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:"13px 16px"}}>
          <span style={{color:T.textSub,display:"flex"}}><IcCamera/></span>
          <span style={{fontFamily:"system-ui",fontSize:14,color:T.textSub}}>Лавлах зураг хавсаргах (заавал биш)</span>
          <input type="file" accept="image/*,video/*" multiple onChange={e=>{
            const files = Array.from(e.target.files||[]);
            files.forEach(f=>{
              const reader = new FileReader();
              reader.onload = ev => setAttachments(prev=>[...prev,{url:ev.target.result,name:f.name,type:f.type}]);
              reader.readAsDataURL(f);
            });
            if(files.length>0) toast(files.length+" файл нэмэгдлээ","success");
          }} style={{display:"none"}}/>
        </label>
        {attachments.length>0&&<div style={{display:"flex",gap:8,marginTop:10,overflowX:"auto",scrollbarWidth:"none"}}>
          {attachments.map((att,i)=><div key={i} style={{position:"relative",flexShrink:0}}>
            {att.type.startsWith("video/")
              ?<video src={att.url} style={{width:80,height:80,borderRadius:10,objectFit:"cover",display:"block",background:T.s2}}/>
              :<img src={att.url} alt="" style={{width:80,height:80,borderRadius:10,objectFit:"cover",display:"block"}}/>}
            <button onClick={()=>setAttachments(a=>a.filter((_,j)=>j!==i))} style={{position:"absolute",top:2,right:2,width:18,height:18,borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9}}><IcX/></button>
          </div>)}
        </div>}
      </>}
      {step===3&&<>
        <div style={{fontFamily:"system-ui",fontSize:16,fontWeight:700,color:T.textH,marginBottom:14}}>Захиалгыг шалгах</div>
        <Crd style={{padding:"16px",marginBottom:16}}>
          {[["Ажлын төрөл",form.type||"Загварын дизайн"],["Төсөв",form.budget||"₮100,000~300,000"],["Хүссэн дуусгах",form.date?form.date.replace(/-/g,"."):"Зохицуулах боломжтой"],["Агуулга",form.desc||"Дэлгэрэнгүй агуулга бичих"],["Хавсралт",attachments.length>0?attachments.length+" файл":"Байхгүй"]].map(r=><div key={r[0]} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
            <span style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>{r[0]}</span>
            <span style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textH,maxWidth:"60%",textAlign:"right"}}>{r[1]}</span>
          </div>)}
        </Crd>
        {attachments.length>0&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",scrollbarWidth:"none"}}>
          {attachments.map((att,i)=><div key={i} style={{flexShrink:0}}>
            {att.type.startsWith("video/")
              ?<video src={att.url} style={{width:72,height:72,borderRadius:10,objectFit:"cover",display:"block",background:T.s2}}/>
              :<img src={att.url} alt="" style={{width:72,height:72,borderRadius:10,objectFit:"cover",display:"block"}}/>}
          </div>)}
        </div>}
        <Crd style={{padding:"13px 16px",background:T.accentSub,border:`1px solid ${T.accentGlow}`,fontFamily:"system-ui",fontSize:13,color:T.textB,lineHeight:1.7}}>Захиалга илгээсний дараа бүтээлчтэй шууд холбогдож, нөхцлийг тохирно.</Crd>
      </>}
      <div style={{height:20}}/>
    </div>
    <div style={{padding:"12px 20px 32px",borderTop:`1px solid ${T.border}`}}>
      <PBtn full loading={loading} onClick={next}>{step<3?"Дараах":"Захиалга илгээх"}</PBtn>
    </div>
  </div>;
}

// ── CHAT LIST ──
function ChatList({nav, refresh}) {
  // Chat list
  const [q,setQ]=useState("");
  const convos = GS.conversations;
  const [showNewChat,setShowNewChat]=useState(false);
  
  const startNewChat = (name, accent) => {
    const newConvo = {
      id: Date.now(),
      name: name,
      accent: accent || T.accent,
      online: false,
      unread: 0,
      msgs: [{id:1,mine:true,text:"Сайн байна уу!",time:new Date().toLocaleTimeString().slice(0,5),read:false,status:"sent"}],
    };
    GS.conversations.unshift(newConvo);
    GS.activeChatId = newConvo.id;
    setShowNewChat(false);
    refresh();
    nav("chatroom");
  };
  const fl=q?convos.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())):convos;
  const total=convos.reduce((s,c)=>s+c.unread,0);

  const openChat = (c) => {
    // Mark all messages as read
    c.msgs.forEach(m=>{ if(!m.mine) m.read=true; });
    const wasUnread = c.unread;
    c.unread = 0;
    GS.unreadChat = Math.max(0, GS.unreadChat - wasUnread);
    GS.activeChatId = c.id;
    refresh();
    nav("chatroom");
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontFamily:"system-ui",fontSize:24,fontWeight:800,color:T.textH}}>Зурвас</div>
          {total>0&&<div style={{minWidth:22,height:22,borderRadius:11,background:T.red,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px"}}><span style={{fontFamily:"system-ui",fontSize:11,fontWeight:700,color:"#fff"}}>{total}</span></div>}
        </div>
        <button onClick={()=>setShowNewChat(!showNewChat)} style={{width:38,height:38,borderRadius:"50%",background:T.s1,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.textSub}}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
        </button>
      </div>
      <div style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:14,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{color:T.textSub,display:"flex"}}><IcSearch/></span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Хайх..." style={{background:"none",border:"none",outline:"none",fontFamily:"system-ui",fontSize:14,color:T.textH,flex:1}}/>
        {q&&<button onClick={()=>setQ("")} style={{background:"none",border:"none",color:T.textSub,cursor:"pointer",display:"flex"}}><IcX/></button>}
      </div>
    </div>
    {/* New chat panel */}
    {showNewChat&&<div style={{padding:"0 20px 14px"}}>
      <Crd style={{padding:"14px 16px"}}>
        <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:10}}>Шинэ харилцаа эхлэх</div>
        <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub,marginBottom:12}}>Бүтээлчийн нэрийг бичнэ үү</div>

// ── CHAT ROOM ──
function ChatRoom({nav, refresh, goBack}) {
  const convo = GS.conversations.find(c=>c.id===GS.activeChatId) || GS.conversations[0];
  const [msg,setMsg]=useState("");
  const [msgs,setMsgs]=useState(convo?.msgs||[]);
  const scrollRef = React.useRef(null);
  const timersRef = React.useRef([]);
  // Cleanup all timers on unmount
  React.useEffect(()=>()=>{timersRef.current.forEach(t=>clearTimeout(t));},[]);

  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  },[msgs]);

  const send=()=>{
    if(!msg.trim())return;
    const newMsg = {id:Date.now(),mine:true,text:msg,time:new Date().getHours()+":"+String(new Date().getMinutes()).padStart(2,"0"),status:"sent"};
    const updated = [...msgs, newMsg];
    setMsgs(updated);
    if(convo) convo.msgs = updated;
    setMsg("");
    // Simulate delivery + read
    timersRef.current.push(setTimeout(()=>{
      newMsg.status = "delivered";
      setMsgs(m=>[...m]);
    }, 600));
    // Simulate reply
    timersRef.current.push(setTimeout(()=>{
      newMsg.status = "read";
      const reply = {id:Date.now()+1,mine:false,text:["Тийм, шалгалаа!","Сайн байна!","Ойлголоо, баярлалаа.","За, мэдэгдэл өгнө!"][Math.floor(Math.random()*4)],time:new Date().getHours()+":"+String(new Date().getMinutes()).padStart(2,"0"),read:true};
      const next = [...msgs, newMsg, reply];
      setMsgs(next);
      if(convo) convo.msgs = next;
    }, 1800));
  };

  const ReadReceipt = ({status}) => {
    if(!status) return null;
    const color = status==="read" ? T.accent : T.textSub;
    return <span style={{display:"inline-flex",alignItems:"center",gap:0,marginLeft:4}}>
      {status==="sent"&&<svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5L5 9L13 1" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      {status==="delivered"&&<svg width="18" height="10" viewBox="0 0 18 10" fill="none"><path d="M1 5L5 9L13 1" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 5L9 9L17 1" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      {status==="read"&&<svg width="18" height="10" viewBox="0 0 18 10" fill="none"><path d="M1 5L5 9L13 1" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 5L9 9L17 1" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    </span>;
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{padding:"20px 20px 12px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${T.border}`}}>
      <button onClick={()=>{GS.activeChatId=null;nav("chat");}} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
      <Avt size={38} color={convo?.accent||T.accent} onClick={()=>nav("profile",{creatorId:convo?.id||1})}/>
      <div style={{flex:1}}>
        <div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH}}>{convo?.name||"The TOONO"}</div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          {convo?.online
            ?<><div style={{width:7,height:7,borderRadius:"50%",background:T.green}}/><span style={{fontFamily:"system-ui",fontSize:12,color:T.green}}>Онлайн</span></>
            :<span style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>Сүүлд идэвхтэй</span>}
        </div>
      </div>
      <PBtn small secondary onClick={()=>nav("commission")}>Захиалга</PBtn>
    </div>
    <div ref={scrollRef} style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"16px 20px"}}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <span style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,background:T.s1,padding:"4px 12px",borderRadius:20}}>Өнөөдөр</span>
      </div>
      {msgs.map(m=><div key={m.id} style={{display:"flex",justifyContent:m.mine?"flex-end":"flex-start",marginBottom:10,alignItems:"flex-end",gap:6}}>
        {!m.mine&&<Avt size={28} color={convo?.accent||T.accent}/>}
        <div style={{maxWidth:"72%"}}>
          {m.img
            ?m.imgSrc
              ?m.isVideo
                ?<video src={m.imgSrc} controls style={{width:200,maxHeight:160,borderRadius:14,display:"block",background:T.s2}}/>
                :<img src={m.imgSrc} alt="" style={{width:200,maxHeight:200,borderRadius:14,objectFit:"cover",display:"block"}}/>
              :<div style={{width:160,height:110,borderRadius:14,background:`linear-gradient(135deg,${T.accent}30,#8850D420)`,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Toono size={50} color="rgba(91,143,232,0.3)"/></div>
            :<div style={{background:m.mine?T.accent:T.s1,borderRadius:m.mine?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",border:m.mine?"none":`1px solid ${T.border}`}}>
              <div style={{fontFamily:"system-ui",fontSize:14,color:m.mine?"#fff":T.textH,lineHeight:1.5}}>{m.text}</div>
            </div>}
          <div style={{fontFamily:"system-ui",fontSize:10,color:T.textSub,marginTop:3,textAlign:m.mine?"right":"left",display:"flex",alignItems:"center",justifyContent:m.mine?"flex-end":"flex-start",gap:2}}>
            {m.time}
            {m.mine&&<ReadReceipt status={m.status}/>}
          </div>
        </div>
      </div>)}
    </div>
    <div style={{padding:"10px 16px 28px",borderTop:`1px solid ${T.border}`,display:"flex",gap:10,alignItems:"flex-end"}}>
      <label style={{width:38,height:38,borderRadius:"50%",background:T.s1,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.textSub,flexShrink:0}}>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" strokeWidth="1.4"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" strokeWidth="1.3"/></svg>
        <input type="file" accept="image/*,video/*" onChange={e=>{
          const f=e.target.files?.[0]; if(!f) return;
          const reader=new FileReader();
          reader.onload=ev=>{
            const newMsg = {id:Date.now(),mine:true,text:"",time:new Date().getHours()+":"+String(new Date().getMinutes()).padStart(2,"0"),img:true,imgSrc:ev.target.result,isVideo:f.type.startsWith("video/"),status:"sent"};
            const updated = [...msgs,newMsg];
            setMsgs(updated);
            if(convo) convo.msgs = updated;
            timersRef.current.push(setTimeout(()=>{newMsg.status="delivered";setMsgs(m=>[...m]);},500));
            timersRef.current.push(setTimeout(()=>{newMsg.status="read";setMsgs(m=>[...m]);},1500));
            toast("Файл илгээлээ","success");
          };
          reader.readAsDataURL(f);
          e.target.value="";
        }} style={{display:"none"}}/>
      </label>
      <div style={{flex:1,background:T.s1,border:`1px solid ${T.border}`,borderRadius:20,padding:"10px 14px",display:"flex",alignItems:"center"}}>
        <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Зурвасийг оруулна уу..." style={{background:"none",border:"none",outline:"none",fontFamily:"system-ui",fontSize:14,color:T.textH,flex:1}}/>
      </div>
      <button onClick={send} style={{width:42,height:42,borderRadius:"50%",background:msg.trim()?T.accent:T.s1,border:`1px solid ${msg.trim()?T.accent:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"background .15s",flexShrink:0,color:msg.trim()?"#fff":T.textSub}}><IcSend/></button>
    </div>
  </div>;
}

// ── NOTIFICATIONS ──
function Notifications({nav, refresh}) {
  const iconMap = {sale:<IcMoney/>,comm:<IcCommission/>,follow:<IcProfile/>,like:<IcHeart/>,upload:<IcUpload/>,money:<IcMoney/>};
  const [notis,setNotis]=useState([...GS.notifications]);
  const unread=notis.filter(n=>!n.read).length;

  const markOne = (n) => {
    if(!n.read) {
      n.read = true;
      // Also mark in GS.notifications
      const gsN = GS.notifications.find(x=>x.id===n.id);
      if(gsN) gsN.read = true;
      GS.unreadNotif = Math.max(0, GS.unreadNotif - 1);
      setNotis([...notis]);
      refresh();
    }
    nav(n.to);
  };

  const markAll = () => {
    notis.forEach(n=>n.read=true);
    GS.notifications.forEach(n=>n.read=true);
    GS.unreadNotif = 0;
    setNotis([...notis]);
    refresh();
    toast("Бүгд уншсан","success");
  };

  return <Simple nav={nav} title={"Мэдэгдэл"+(unread>0?" ("+unread+")":"")} back="me" right={unread>0&&<button onClick={markAll} style={{background:"none",border:"none",fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.accent,cursor:"pointer"}}>Бүгдийг уншсан</button>}>
    {notis.length===0
      ?<Empty icon={<IcBell/>} title="Мэдэгдэл байхгүй" sub="Шинэ мэдэгдэл ирэхэд энд харагдана"/>
      :notis.map(n=><div key={n.id} onClick={()=>markOne(n)} style={{padding:"14px 0",display:"flex",gap:14,alignItems:"flex-start",borderBottom:`1px solid ${T.border}`,cursor:"pointer",transition:"background .15s"}}>
      <div style={{width:42,height:42,borderRadius:13,background:n.read?T.s2:T.accentSub,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,border:`1px solid ${n.read?T.border:T.accentGlow}`,color:n.read?T.textSub:T.accent}}>{iconMap[n.icon]||<IcBell/>}</div>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:n.read?500:700,color:n.read?T.textSub:T.textH}}>{n.title}</div>
          <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub}}>{n.time}</div>
        </div>
        <div style={{fontFamily:"system-ui",fontSize:13,color:n.read?T.textSub:T.textB,lineHeight:1.5}}>{n.desc}</div>
      </div>
      {!n.read&&<div style={{width:8,height:8,borderRadius:"50%",background:T.accent,marginTop:6,flexShrink:0}}/>}
    </div>)}
  </Simple>;
}

// ── EDIT PROFILE ──
function EditProfile({nav, refresh, goBack}) {
  const [saving,setSaving]=useState(false);
  const [name, setName]   = useState(GS.user.name);
  const [field, setField] = useState(GS.user.field);
  // Dynamic follower count
  GS.user.followers = String(GS.following?.size || 0);
  const [bio, setBio]     = useState(GS.user.bio);
  const [tags, setTags]   = useState([...GS.user.tags]);
  const [newTag, setNewTag] = useState("");
  const [photo, setPhoto] = useState(GS.user.photo); // base64 or null
  const [cropSrc, setCropSrc] = useState(null);
  const [loading, setLoading] = useState(false);

  const handlePhoto = (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = ev => setCropSrc(ev.target.result);
    reader.readAsDataURL(f);
  };

  const save = () => {
    if(!name.trim()) { toast("Нэр оруулна уу","error"); return; }
    setLoading(true);
    setTimeout(() => {
      // Update GS.user
      GS.user.name  = name.trim();
      GS.user.field = field.trim();
      GS.user.bio   = bio.trim();
      GS.user.tags  = tags.filter(t => t.length > 0);
      if(photo) GS.user.photo = photo;
      setLoading(false);
      refresh();          // Force re-render
      nav("me");
      toast("Профайл хадгалагдлаа","success");
    }, 600);
  };

  return <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
    {cropSrc&&<ImageCropper src={cropSrc} aspect="circle" onDone={(cropped)=>{setPhoto(cropped);setCropSrc(null);}} onCancel={()=>setCropSrc(null)}/>}
    <div style={{padding:"20px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>{
        if(step>0) setStep(step-1);
        else if(title||desc||mediaFiles.length>0){
          if(window.confirm("Хадгалаагүй мэдээлэл байна. Гарах уу?")) nav("me");
        } else nav("me");
      }} style={{background:"none",border:"none",color:T.textH,cursor:"pointer",display:"flex"}}><IcBack/></button>
      <div style={{fontFamily:"system-ui",fontSize:18,fontWeight:700,color:T.textH}}>Профайл засах</div>
      <PBtn small loading={loading} onClick={save}>Хадгалах</PBtn>
    </div>

    <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none",padding:"0 20px"}}>

      {/* Avatar */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:20,borderBottom:`1px solid ${T.border}`,marginBottom:20}}>
        <div style={{position:"relative",marginBottom:12}}>
          <div style={{width:88,height:88,borderRadius:26,background:T.accentSub,border:`2px solid ${T.accentGlow}`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {photo
              ? <img src={photo} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              : <div style={{color:T.accent,display:"flex"}}><IcProfile/></div>}
          </div>
          <label style={{position:"absolute",bottom:-6,right:-6,width:30,height:30,borderRadius:"50%",background:T.accent,border:`2px solid ${T.bg}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>
            <IcCamera/>
            <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
          </label>
        </div>
        <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>Зураг дарж солих</div>
      </div>

      {/* Fields */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Нэр / Хочоо *</div>
        <input value={name} onChange={e=>setName(e.target.value)} style={{width:"100%",background:T.s1,border:`1.5px solid ${name?T.green:T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:15,fontWeight:600,color:T.textH,outline:"none",boxSizing:"border-box"}}/>

      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Мэргэжил / Чиглэл</div>

      </div>

      <div style={{marginBottom:18}}>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:7}}>Биеийн танилцуулга</div>
        <textarea value={bio} onChange={e=>setBio(e.target.value)} rows={4} placeholder="Өөрийгөө товч танилцуулна уу..." style={{width:"100%",background:T.s1,border:`1px solid ${T.border}`,borderRadius:13,padding:"13px 16px",fontFamily:"system-ui",fontSize:14,color:T.textH,outline:"none",resize:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
        <div style={{fontFamily:"system-ui",fontSize:11,color:T.textSub,marginTop:4,textAlign:"right"}}>{bio.length} тэмдэгт</div>

      <div style={{marginBottom:18}}>
        <div style={{fontFamily:"system-ui",fontSize:13,fontWeight:600,color:T.textSub,marginBottom:10}}>Таг / Чиглэл</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
          {tags.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:5,background:T.accentSub,border:`1px solid ${T.accentGlow}`,borderRadius:20,padding:"5px 12px"}}>
            <span style={{fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.accent}}>{t}</span>
            <button onClick={()=>setTags(tags.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:T.accent,display:"flex",padding:0,lineHeight:1}}><IcX/></button>
          </div>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newTag.trim()){setTags([...tags,newTag.trim()]);setNewTag("");}}} placeholder="Шинэ таг..." style={{flex:1,background:T.s1,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 14px",fontFamily:"system-ui",fontSize:13,color:T.textH,outline:"none"}}/>
          <PBtn small onClick={()=>{if(newTag.trim()){setTags([...tags,newTag.trim()]);setNewTag("");}}} disabled={!newTag.trim()}>Нэмэх</PBtn>
        </div>
      </div>

      <div style={{height:30}}/>
    </div>
  </div>;
}

        </svg>
        {/* X-axis labels */}
        <div style={{display:"flex",position:"absolute",bottom:-18,left:0,right:0}}>
          {["1","2","3","4","5","6"].map((m,i)=><div key={i} style={{flex:1,textAlign:"center",fontFamily:"system-ui",fontSize:9,color:T.textSub}}>{m}р</div>)}

      </div>
      <div style={{height:20}}/>
      {/* Bar chart (legacy) */}
      <div style={{display:"none",alignItems:"flex-end",gap:8,height:100}}>
        {revenues.map((r,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{fontFamily:"system-ui",fontSize:9,color:T.textSub}}>{Math.floor(r/10)}K</div>
          <div style={{width:"100%",height:(r/maxR*80)+"px",background:i===revenues.length-1?T.accent:T.accentSub,borderRadius:"4px 4px 0 0",border:`1px solid ${i===revenues.length-1?T.accent:T.accentGlow}`}}/>
          <div style={{fontFamily:"system-ui",fontSize:9,color:T.textSub}}>{months[i]}</div>
        </div>)}
      </div>
    </Crd>
    {GS.orders.length>0?GS.orders.slice(0,5).map((o,i)=><Crd key={o.id||i} style={{padding:"14px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontFamily:"system-ui",fontSize:16,fontWeight:800,color:T.textH}}>₮{(o.price||0).toLocaleString()}</div><div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{o.date}</div></div>
      <span style={{fontFamily:"system-ui",fontSize:12,fontWeight:600,color:T.green,background:T.greenSub,padding:"4px 12px",borderRadius:8}}>{o.status==="done"?"Тооцоо дууссан":"Явагдаж байна"}</span>
    </Crd>):<div style={{textAlign:"center",padding:"30px 0"}}><div style={{fontFamily:"system-ui",fontSize:15,fontWeight:700,color:T.textH,marginBottom:6}}>Орлогын түүх байхгүй</div><div style={{fontFamily:"system-ui",fontSize:13,color:T.textSub}}>Эхний борлуулалтын дараа энд харагдана</div></div>}
    {false&&[].map(r=><Crd key={r[0]} style={{padding:"14px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        <div style={{fontFamily:"system-ui",fontSize:14,fontWeight:700,color:T.textH,marginBottom:2}}>{r[1]}</div>
        <div style={{fontFamily:"system-ui",fontSize:12,color:T.textSub}}>{r[0]} · {r[2]}</div>
